<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>証言の穴 ― 矛盾推理</title>
<style>
  :root{
    --ink:#10131b;          /* 墨紺の背景 */
    --ink2:#171b26;         /* パネル */
    --line:#2c3240;         /* 罫線 */
    --paper:#e9e0cd;        /* 古紙 */
    --paper-edge:#d8ccb0;
    --paper-ink:#2b2620;    /* 紙の上の墨字 */
    --fog:#9aa0ad;          /* くすんだ文字 */
    --fog2:#6d7382;
    --pale:#dadde4;         /* 明るい文字 */
    --seal:#bb3a2a;         /* 朱・印 */
    --seal-deep:#922a1d;
    --gold:#cda64a;         /* 解決の金 */
    --gold-deep:#9c7a2c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #1b2030 0%, var(--ink) 55%, #0b0d14 100%);
    color:var(--pale);
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    line-height:1.8;
    min-height:100%;
    -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap{max-width:760px;margin:0 auto;padding:32px 20px 80px}
  .serif{font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho",serif}

  /* ===== ヘッダ ===== */
  .masthead{text-align:center;margin-bottom:8px}
  .masthead .eyebrow{
    font-size:11px;letter-spacing:.5em;color:var(--fog2);
    text-indent:.5em;margin-bottom:14px;
  }
  .masthead h1{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-weight:600;font-size:clamp(30px,8vw,46px);
    letter-spacing:.12em;text-indent:.12em;line-height:1.25;
    background:linear-gradient(180deg,#f3eddc,#c9c2b0);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .masthead .sub{color:var(--fog);font-size:14px;margin-top:12px;letter-spacing:.08em}
  .rule{height:1px;background:linear-gradient(90deg,transparent,var(--line) 18%,var(--line) 82%,transparent);margin:26px 0}

  /* ===== スコア帯 ===== */
  .statusbar{
    display:flex;align-items:center;justify-content:space-between;
    gap:12px;margin-bottom:20px;font-size:12.5px;color:var(--fog);
    letter-spacing:.08em;
  }
  .statusbar .pips{display:flex;gap:7px}
  .pip{width:9px;height:9px;border-radius:50%;border:1px solid var(--line);background:transparent;transition:.3s}
  .pip.solved{background:var(--gold);border-color:var(--gold-deep);box-shadow:0 0 8px rgba(205,166,74,.45)}
  .pip.missed{background:var(--seal);border-color:var(--seal-deep)}
  .pip.current{border-color:var(--pale);transform:scale(1.18)}

  /* ===== 事件カード ===== */
  .case-no{font-size:12px;letter-spacing:.4em;color:var(--seal);text-indent:.4em;margin-bottom:8px}
  .case-title{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:clamp(22px,5.5vw,30px);font-weight:600;letter-spacing:.06em;margin-bottom:14px}
  .summary{color:var(--fog);font-size:15px;margin-bottom:26px}

  .facts{
    border:1px solid var(--line);
    background:linear-gradient(180deg,rgba(255,255,255,.015),transparent);
    border-radius:4px;padding:18px 20px 20px;margin-bottom:30px;position:relative;
  }
  .facts::before{
    content:"確定した事実";position:absolute;top:-10px;left:16px;
    background:var(--ink);padding:0 10px;font-size:12px;letter-spacing:.3em;
    color:var(--gold);text-indent:.3em;
  }
  .facts ul{list-style:none;display:grid;gap:11px}
  .facts li{position:relative;padding-left:24px;font-size:14.5px;color:#cfd3db}
  .facts li::before{content:"";position:absolute;left:4px;top:11px;width:7px;height:7px;border:1px solid var(--gold);transform:rotate(45deg)}

  .instruct{font-size:13.5px;color:var(--fog2);letter-spacing:.04em;margin-bottom:18px;text-align:center}
  .instruct b{color:var(--seal);font-weight:600}

  /* ===== 証言カード ===== */
  .testimonies{display:grid;gap:16px}
  .stmt{
    position:relative;cursor:pointer;text-align:left;width:100%;
    background:linear-gradient(175deg,var(--paper),var(--paper-edge));
    color:var(--paper-ink);border:none;border-radius:3px;
    padding:18px 20px 20px;
    box-shadow:0 1px 0 rgba(0,0,0,.5),0 10px 22px -14px rgba(0,0,0,.8);
    transition:transform .14s ease, box-shadow .2s ease, filter .2s;
    font-family:inherit;
  }
  .stmt::after{ /* 紙の留め具(セロテープ風) */
    content:"";position:absolute;top:-7px;left:50%;transform:translateX(-50%) rotate(-1deg);
    width:54px;height:16px;background:rgba(220,228,235,.18);border:1px solid rgba(255,255,255,.12);
    border-radius:1px;
  }
  .stmt:not(:disabled):hover{transform:translateY(-3px) rotate(-.3deg);box-shadow:0 1px 0 rgba(0,0,0,.5),0 18px 30px -16px rgba(0,0,0,.9)}
  .stmt:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
  .stmt .who{display:flex;align-items:baseline;gap:10px;margin-bottom:9px}
  .stmt .name{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-weight:600;font-size:17px;letter-spacing:.04em}
  .stmt .role{font-size:11.5px;color:#7c7468;letter-spacing:.06em}
  .stmt .quote{font-size:15px;line-height:1.85;position:relative}
  .stmt .quote::before{content:"「";color:#9a9082}
  .stmt .quote::after{content:"」";color:#9a9082}

  /* 印（嘘・確） */
  .stamp{
    position:absolute;top:50%;right:18px;transform:translateY(-50%) rotate(-14deg) scale(.4);
    width:74px;height:74px;border-radius:50%;display:grid;place-items:center;
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-weight:700;
    font-size:30px;letter-spacing:.05em;opacity:0;pointer-events:none;
    transition:transform .25s cubic-bezier(.2,1.5,.5,1),opacity .2s;
  }
  .stamp.lie{color:var(--seal);border:3px double var(--seal)}
  .stamp.ok{color:var(--gold-deep);border:3px double var(--gold-deep)}
  .stmt.show-stamp .stamp{opacity:.92;transform:translateY(-50%) rotate(-14deg) scale(1)}

  .stmt.is-lie{box-shadow:0 0 0 2px var(--seal),0 14px 30px -14px rgba(187,58,42,.7)}
  .stmt.is-cleared{filter:saturate(.7) brightness(.97)}
  .stmt.shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}
  .stmt:disabled{cursor:default}

  /* ===== 判定 ===== */
  .verdict{margin-top:28px;border-top:1px dashed var(--line);padding-top:24px;display:none}
  .verdict.on{display:block;animation:rise .45s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .verdict .tag{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:21px;font-weight:600;letter-spacing:.1em;margin-bottom:12px}
  .verdict .tag.win{color:var(--gold)}
  .verdict .tag.lose{color:var(--seal)}
  .verdict .body{font-size:14.5px;color:#cdd1d9}
  .verdict .body b{color:var(--pale)}

  .hint{margin-top:18px;font-size:13.5px;color:var(--seal);background:rgba(187,58,42,.08);border:1px solid rgba(187,58,42,.3);border-radius:4px;padding:12px 16px;display:none}
  .hint.on{display:block;animation:rise .3s ease both}
  .hint::before{content:"指摘の余地あり ― ";color:var(--seal);font-weight:600}

  /* ===== ボタン ===== */
  .actions{margin-top:30px;text-align:center}
  .btn{
    font-family:inherit;cursor:pointer;border:1px solid var(--line);
    background:linear-gradient(180deg,#222838,#191e2a);color:var(--pale);
    padding:14px 34px;border-radius:3px;font-size:15px;letter-spacing:.14em;text-indent:.14em;
    transition:.2s;
  }
  .btn:hover{border-color:var(--gold-deep);color:#fff;box-shadow:0 0 18px -6px rgba(205,166,74,.5)}
  .btn:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
  .btn.primary{background:linear-gradient(180deg,#caa64c,#a07e2b);color:#1a1408;border-color:var(--gold-deep);font-weight:600}
  .btn.primary:hover{filter:brightness(1.08)}

  /* ===== タイトル / 結果 ===== */
  .screen{text-align:center;padding-top:14px}
  .screen p.lede{color:var(--fog);font-size:15px;max-width:520px;margin:0 auto 8px}
  .glass{font-size:54px;margin:20px 0 8px;filter:drop-shadow(0 6px 14px rgba(0,0,0,.6))}
  .howto{text-align:left;max-width:460px;margin:30px auto 0;display:grid;gap:14px}
  .howto .step{display:flex;gap:14px;align-items:flex-start;font-size:14px;color:#cdd1d9}
  .howto .n{flex:none;width:26px;height:26px;border:1px solid var(--gold-deep);color:var(--gold);border-radius:50%;display:grid;place-items:center;font-size:13px;font-family:serif}

  .result-score{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:60px;font-weight:600;letter-spacing:.04em;margin:6px 0}
  .result-score .of{font-size:24px;color:var(--fog)}
  .rank{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:24px;letter-spacing:.16em;text-indent:.16em;color:var(--gold);margin-bottom:10px}

  .hidden{display:none !important}
  .credit{text-align:center;color:var(--fog2);font-size:11px;letter-spacing:.1em;margin-top:50px}
</style>
</head>
<body>
<div class="wrap">

  <!-- タイトル -->
  <section id="title" class="screen">
    <div class="masthead">
      <div class="eyebrow">推 理 ゲ ー ム</div>
      <h1>証言の穴</h1>
    </div>
    <div class="glass">🔍</div>
    <p class="lede serif" style="font-size:18px;color:var(--pale);letter-spacing:.04em">嘘は、必ず事実とぶつかる。</p>
    <p class="lede">確定した事実と、三人の容疑者の証言。<br>たった一人だけ、つじつまの合わない嘘をついている。</p>
    <div class="howto">
      <div class="step"><span class="n">1</span><span><b>確定した事実</b>に目を通す。これらは動かない真実だ。</span></div>
      <div class="step"><span class="n">2</span><span>三人の<b>証言</b>を読み、事実と矛盾する一人を探す。</span></div>
      <div class="step"><span class="n">3</span><span>嘘をついている人物の証言カードを選んで指摘する。</span></div>
    </div>
    <div class="actions"><button class="btn primary" onclick="startGame()">捜査を始める</button></div>
    <div class="credit">全 4 事件 ／ 矛盾を見抜け</div>
  </section>

  <!-- ゲーム -->
  <section id="game" class="hidden">
    <div class="statusbar">
      <span id="caseCount"></span>
      <div class="pips" id="pips"></div>
    </div>
    <div class="case-no" id="caseNo"></div>
    <h2 class="case-title serif" id="caseTitle"></h2>
    <p class="summary" id="caseSummary"></p>

    <div class="facts"><ul id="factList"></ul></div>

    <p class="instruct">事実と<b>矛盾する証言</b>をした人物を選べ。</p>
    <div class="testimonies" id="testimonies"></div>

    <div class="hint" id="hint"></div>

    <div class="verdict" id="verdict">
      <div class="tag" id="verdictTag"></div>
      <div class="body" id="verdictBody"></div>
      <div class="actions"><button class="btn primary" id="nextBtn" onclick="nextCase()"></button></div>
    </div>
  </section>

  <!-- 結果 -->
  <section id="result" class="screen hidden">
    <div class="masthead"><div class="eyebrow">捜 査 終 了</div></div>
    <div class="glass">🗂️</div>
    <div class="rank" id="rankTitle"></div>
    <div class="result-score serif"><span id="finalScore"></span><span class="of"> / 4</span></div>
    <p class="lede" id="resultMsg"></p>
    <div class="actions"><button class="btn primary" onclick="restart()">もう一度</button></div>
  </section>

</div>

<script>
const CASES = [
  {
    title:"雨の夜のマンション",
    summary:"高級マンションの5階で、住人が殺害された。犯行は昨夜21時ごろと見られている。",
    facts:[
      "昨夜は19時から朝までずっと雨が降り続いていた",
      "エレベーターは終日故障中で、移動は階段しか使えなかった",
      "被害者の部屋は5階にある",
    ],
    suspects:[
      {name:"沢田", role:"マンション管理人", quote:"21時ごろは1階のロビーで受付に座っていました。階段を上っていく人は見ていません", lie:false},
      {name:"三浦", role:"被害者の同僚", quote:"20時半ごろ訪ねました。エレベーターで5階まで上がったので、階段は使っていません", lie:true},
      {name:"北原", role:"隣室の住人", quote:"ちょうど帰宅したところで、傘を差していても服の裾がびしょ濡れでした", lie:false},
    ],
    why:"エレベーターは終日故障中だった。三浦の「エレベーターで5階まで上がった」という証言は事実とぶつかる。現場までどう移動したかを偽っている。",
  },
  {
    title:"雪の山荘",
    summary:"雪深い山荘で資産家が殺された。室内は内側から施錠された密室だった。",
    facts:[
      "ドアと窓はすべて内側から施錠されていた",
      "窓の外には20cmの雪が積もり、外部からの足跡は一つもなかった",
      "暖炉の火は、事件が起きた時にはすでに消えていた",
    ],
    suspects:[
      {name:"河合", role:"資産家の秘書", quote:"窓から外を見ましたが、雪の上に足跡ひとつなく、ただ真っ白でした", lie:false},
      {name:"戸田", role:"資産家の甥", quote:"とても寒かったので、暖炉の火にあたって体を暖めていました", lie:true},
      {name:"安西", role:"住み込みの料理人", quote:"物音で目が覚めましたが、私の部屋のドアは閉まったままでした", lie:false},
    ],
    why:"暖炉の火は事件当時すでに消えていた。戸田の「暖炉の火にあたって暖まっていた」という証言は事実と合わない。火が消えていた時間帯の自分の行動を偽っている。",
  },
  {
    title:"レストランの惨劇",
    summary:"老舗レストランで、常連客が食事の途中に倒れて命を落とした。料理から毒物が検出された。",
    facts:[
      "被害者は重度のナッツアレルギーで、ナッツ類は決して口にしなかった",
      "その日のコースは、ナッツを一切使わない特別メニューだった",
      "厨房は18時から閉店まで、シェフ一人だけが立っていた",
    ],
    suspects:[
      {name:"真鍋", role:"料理長", quote:"18時からずっと一人で厨房にいて、ほかの誰も中には入れていません", lie:false},
      {name:"矢島", role:"給仕係", quote:"被害者は出された料理を、残さずきれいに召し上がっていました", lie:false},
      {name:"桐谷", role:"同席していた知人", quote:"彼がナッツ入りのデザートを、美味しそうに頬張っていたのを見ましたよ", lie:true},
    ],
    why:"被害者は重度のナッツアレルギーで、ナッツ類は決して口にしなかった。桐谷の「ナッツ入りのデザートを食べていた」という証言は被害者の人物像と矛盾する。被害者が自らナッツを口にしたかのように見せかけ、毒物の混入から目をそらそうとしている。",
  },
  {
    title:"深夜のオフィス",
    summary:"夜更けのオフィスビルで、残業中の社員が殺害された。犯行は23時ごろと推定されている。",
    facts:[
      "ビルの照明は、22時に全館が自動で消灯される設定だった",
      "エレベーターの利用ログに、23時前後の記録は残っていなかった",
      "被害者のパソコンは23時5分にログオフされていた",
    ],
    suspects:[
      {name:"桑原", role:"同じ部署の同僚", quote:"23時ごろ、まだ明るいフロアで書類の整理をしていました", lie:true},
      {name:"飯田", role:"夜間警備員", quote:"エレベーターは使わず、非常階段を歩いて帰りました", lie:false},
      {name:"大久保", role:"被害者の上司", quote:"22時より前には退社して、そのあとはずっと自宅にいました", lie:false},
    ],
    why:"ビルの照明は22時に全館が自動消灯される。桑原の「23時ごろ、明るいフロアで書類を整理していた」という証言は成立しない。消灯後も居残っていた事実を、ごく普通の残業のように偽っている。",
  },
];

let order=[], idx=0, score=0, results=[], locked=false;

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}

function startGame(){
  order = shuffle([...Array(CASES.length).keys()]);
  idx=0; score=0; results=new Array(CASES.length).fill(null);
  document.getElementById('title').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  renderCase();
}

function buildPips(){
  const pips=document.getElementById('pips'); pips.innerHTML='';
  for(let i=0;i<CASES.length;i++){
    const p=document.createElement('span'); p.className='pip';
    if(results[i]==='win')p.classList.add('solved');
    else if(results[i]==='lose')p.classList.add('missed');
    if(i===idx)p.classList.add('current');
    pips.appendChild(p);
  }
}

function renderCase(){
  locked=false;
  const c=CASES[order[idx]];
  document.getElementById('caseCount').textContent=`第 ${idx+1} 事件 / 全 ${CASES.length} 事件`;
  document.getElementById('caseNo').textContent=`FILE No.${String(idx+1).padStart(2,'0')}`;
  document.getElementById('caseTitle').textContent=c.title;
  document.getElementById('caseSummary').textContent=c.summary;
  buildPips();

  const fl=document.getElementById('factList'); fl.innerHTML='';
  c.facts.forEach(f=>{const li=document.createElement('li');li.textContent=f;fl.appendChild(li)});

  const sus=shuffle(c.suspects.map((s,i)=>({...s,i})));
  const box=document.getElementById('testimonies'); box.innerHTML='';
  sus.forEach(s=>{
    const b=document.createElement('button');
    b.className='stmt';
    b.innerHTML=`
      <div class="who"><span class="name serif">${s.name}</span><span class="role">${s.role}</span></div>
      <div class="quote">${s.quote}</div>
      <div class="stamp ${s.lie?'lie':'ok'} serif">${s.lie?'嘘':'確'}</div>`;
    b.addEventListener('click',()=>pick(b,s));
    box.appendChild(b);
  });

  document.getElementById('hint').classList.remove('on');
  document.getElementById('verdict').classList.remove('on');
  window.scrollTo({top:0,behavior:'smooth'});
}

let triedWrong=false;
function pick(btn,s){
  if(locked)return;
  if(s.lie){
    locked=true;
    const c=CASES[order[idx]];
    const won = !triedWrong;
    btn.classList.add('show-stamp','is-lie');
    // 他のカードを無効化
    document.querySelectorAll('.stmt').forEach(el=>{el.disabled=true;if(el!==btn)el.classList.add('is-cleared')});
    if(won){score++;results[order[idx]]='win';}
    else{results[order[idx]]='lose';}
    buildPips();
    showVerdict(won,c,s);
  }else{
    triedWrong=true;
    btn.classList.remove('shake');void btn.offsetWidth;btn.classList.add('shake');
    btn.classList.add('show-stamp');
    const hint=document.getElementById('hint');
    hint.textContent=`${s.name}の証言は、確定した事実と食い違っていない。もう一度、事実と照らし合わせてみよう。`;
    hint.classList.add('on');
    results[order[idx]]='lose';
  }
}

function showVerdict(won,c,s){
  const v=document.getElementById('verdict');
  document.getElementById('hint').classList.remove('on');
  const tag=document.getElementById('verdictTag');
  tag.className='tag '+(won?'win':'lose');
  tag.textContent=won?'看破 ― 矛盾を突いた':'検挙 ― だが一度見逃した';
  document.getElementById('verdictBody').innerHTML=
    `嘘をついていたのは <b>${s.name}</b> だった。<br><br>${c.why}`;
  const nb=document.getElementById('nextBtn');
  nb.textContent = idx<CASES.length-1 ? '次の事件へ' : '捜査結果を見る';
  v.classList.add('on');
}

function nextCase(){
  triedWrong=false;
  if(idx<CASES.length-1){idx++;renderCase();}
  else showResult();
}

function showResult(){
  document.getElementById('game').classList.add('hidden');
  const r=document.getElementById('result'); r.classList.remove('hidden');
  document.getElementById('finalScore').textContent=score;
  let rank,msg;
  if(score===4){rank='名 探 偵';msg='一度も見逃さず、すべての嘘を一発で見抜いた。事実は、あなたの前ではどんな嘘も隠せない。';}
  else if(score===3){rank='敏 腕 刑 事';msg='ほとんどの矛盾を的確に突いた。あと一歩で完璧な推理だった。';}
  else if(score===2){rank='見 習 い 捜 査 官';msg='半分の事件を解決。事実と証言を照らし合わせる目は、確かに育っている。';}
  else if(score===1){rank='新 人';msg='一件を看破。焦らず、まず動かぬ事実から押さえていこう。';}
  else{rank='傍 観 者';msg='今回は嘘に翻弄された。事実は必ず証言のどこかとぶつかる。もう一度、落ち着いて。';}
  document.getElementById('rankTitle').textContent=rank;
  document.getElementById('resultMsg').textContent=msg;
  window.scrollTo({top:0,behavior:'smooth'});
}

function restart(){startGame();}
</script>
</body>
</html>
