<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名探偵キメラ・カードバトル - 衝撃の自己紹介</title>
    <style>
        body {
            background-color: #0f1115;
            background-image: radial-gradient(circle at 50% 30%, #2c3e50 0%, #0f1115 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
        }

        /* 漫画パネル（画像ベース） */
        .manga-panel-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px; /* 画像の最大サイズ */
            margin-bottom: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border: 4px solid #fff;
            border-radius: 4px;
            background-color: #fff;
        }

        .base-image {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 左側の吹き出しを覆う白丸 */
        .custom-bubble {
            position: absolute;
            top: 7%;
            left: 2%;
            width: 45%;
            height: 32%;
            background-color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
            transform: rotate(-2deg); /* 吹き出しの傾きに合わせる */
        }

        /* 縦書きテキストコンテナ */
        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-family: 'Hiragino Mincho ProN', 'MS PMincho', serif; /* 漫画風の明朝体 */
            font-size: clamp(16px, 5vw, 24px); /* 画面サイズに合わせて拡縮 */
            font-weight: 900;
            color: #000;
            line-height: 1.5;
            height: 90%;
            display: flex;
            flex-wrap: wrap;
            align-content: center;
            justify-content: center;
        }

        /* 召喚ボタン */
        button {
            background: linear-gradient(135deg, #f39c12 0%, #d35400 100%);
            color: #111;
            border: none;
            padding: 20px 60px;
            font-size: 24px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(243, 156, 18, 0.4);
            transition: all 0.2s ease;
            letter-spacing: 2px;
        }

        button:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 12px 30px rgba(243, 156, 18, 0.6); 
        }
        
        button:active {
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <div class="manga-panel-wrapper">
        <img src="コナン名前.jpg" alt="Conan" class="base-image">
        
        <div class="custom-bubble">
            <div class="vertical-text" id="res-text">
                <!-- ここに縦書きの名前が入ります -->
            </div>
        </div>
    </div>

    <button onclick="generateChimera()">運命の召喚！</button>

<script>
const parts1 = [
    { text: "シャー" }, { text: "江戸" }, { text: "金田" }, { text: "古" },
    { text: "夜神" }, { text: "高" }, { text: "津" }, { text: "黒" },
    { text: "モリア" }, { text: "浅" }
];

const parts2 = [
    { text: "ロッ" }, { text: "川コ" }, { text: "一耕" }, { text: "畑任" },
    { text: "ライト" }, { text: "遠遙" }, { text: "川館" }, { text: "タイ" },
    { text: "ーティ" }, { text: "浅見" }
];

const parts3 = [
    { text: "ク" }, { text: "ナン" }, { text: "助" }, { text: "三郎" },
    { text: "月" }, { text: "一" }, { text: "長" }, { text: "ツ" },
    { text: "教授" }, { text: "ジャック" }
];

// 初期ロード時にも一度名前を生成する
window.onload = () => {
    generateChimera();
};

function generateChimera() {
    const p1 = parts1[Math.floor(Math.random() * parts1.length)].text;
    const p2 = parts2[Math.floor(Math.random() * parts2.length)].text;
    const p3 = parts3[Math.floor(Math.random() * parts3.length)].text;

    // 名前を結合
    const fullName = p1 + p2 + p3;

    // 漫画のように右行と左行に分けるため、名前の文字数を真ん中で分割する
    const midPoint = Math.ceil(fullName.length / 2);
    const line1 = fullName.substring(0, midPoint);
    const line2 = fullName.substring(midPoint) + "だ！！！";

    // 縦書きコンテナに出力（<br>を入れることで右から左へ改行される）
    document.getElementById('res-text').innerHTML = `${line1}<br>${line2}`;
}
</script>

</body>
</html>
