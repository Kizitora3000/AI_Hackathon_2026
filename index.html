<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>混沌のボタン</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #111;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
  }

  #app {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  #counter {
    position: fixed;
    top: 20px;
    right: 24px;
    font-size: 0.55rem;
    color: #444;
    z-index: 10;
    transition: color 0.5s;
  }

  #hint {
    position: fixed;
    top: 20px;
    left: 24px;
    font-size: 0.4rem;
    color: #2a2a2a;
    z-index: 10;
    line-height: 1.8;
    max-width: 40vw;
  }

  #effect-label {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.45rem;
    color: #555;
    text-align: center;
    z-index: 10;
    min-height: 1.4em;
    transition: opacity 0.5s;
    white-space: nowrap;
  }

  /* THE BUTTON */
  #btn-wrapper {
    position: relative;
  }

  #chaos-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 1.2rem;
    padding: 36px 56px;
    background: #e02020;
    color: #fff;
    border: none;
    cursor: pointer;
    border-radius: 10px;
    box-shadow: 0 8px 0 #881010, 0 0 40px rgba(220,30,30,0.35);
    transition: transform 0.08s, box-shadow 0.08s, background 0.4s, border-radius 0.4s,
                opacity 0.3s, width 0.3s, height 0.3s, filter 0.3s;
    position: relative;
    z-index: 5;
    user-select: none;
    white-space: nowrap;
  }

  #chaos-btn:active {
    transform: translateY(5px) scale(0.97);
    box-shadow: 0 3px 0 #881010;
  }

  /* Speech bubble */
  #speech {
    position: absolute;
    background: #fff;
    color: #111;
    font-size: 0.38rem;
    padding: 10px 14px;
    border-radius: 10px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 20;
    bottom: calc(100% + 16px);
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    line-height: 1.8;
    text-align: center;
  }
  #speech::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
    border-top-color: #fff;
    border-bottom: none;
  }
  #speech.show { opacity: 1; }

  /* Particles */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    font-size: 1.6rem;
    animation: particleFly 1s ease-out forwards;
  }
  @keyframes particleFly {
    0%   { opacity: 1; transform: translate(0,0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(0.4); }
  }

  /* Flash overlay */
  #flash {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.06s;
  }

  /* Achievement toast */
  #achievement {
    position: fixed;
    top: -120px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    color: #000;
    padding: 14px 28px;
    border-radius: 8px;
    font-size: 0.5rem;
    z-index: 400;
    text-align: center;
    transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(255,215,0,0.5);
    line-height: 1.8;
  }
  #achievement.show { top: 24px; }

  /* Matrix rain */
  #matrix {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    transition: opacity 0.3s;
    overflow: hidden;
  }
  #matrix.show { opacity: 0.55; }
  .matrix-col {
    position: absolute;
    top: -100%;
    color: #00ff41;
    font-family: monospace;
    font-size: 13px;
    line-height: 1.4;
    animation: matrixFall linear forwards;
    white-space: pre;
  }
  @keyframes matrixFall { to { top: 120%; } }

  /* Scanlines */
  #scanlines {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 150;
    opacity: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px
    );
    transition: opacity 0.4s;
  }
  #scanlines.show { opacity: 1; }

  /* Fake duplicate buttons */
  .fake-btn {
    position: fixed;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.5rem;
    padding: 12px 18px;
    background: #b01010;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: not-allowed;
    z-index: 4;
    pointer-events: none;
    animation: fakeFade 2.2s ease-out forwards;
  }
  @keyframes fakeFade {
    0%   { opacity: 0; transform: scale(0.4); }
    20%  { opacity: 0.7; transform: scale(1); }
    80%  { opacity: 0.7; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.4); }
  }

  /* BSOD */
  #bsod {
    position: fixed; inset: 0;
    background: #0078d7;
    color: #fff;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 1000;
    font-family: monospace;
    text-align: center;
    padding: 40px;
  }
  #bsod .bsod-emoji { font-size: 5rem; margin-bottom: 24px; }
  #bsod h2 { font-size: 1.2rem; margin-bottom: 20px; }
  #bsod p { font-size: 0.8rem; line-height: 2; color: #cce4ff; }

  /* Loading bar */
  #loading-container {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: min(340px, 80vw);
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    z-index: 60;
  }
  #loading-label { font-size: 0.4rem; color: #888; }
  #loading-track {
    width: 100%;
    height: 14px;
    background: #222;
    border: 1px solid #444;
    border-radius: 2px;
  }
  #loading-bar {
    height: 100%;
    background: linear-gradient(90deg, #00f0ff, #ff0090);
    width: 0%;
    border-radius: 2px;
    transition: width 0.08s linear;
  }

  /* Big emoji pop */
  .big-emoji {
    position: fixed;
    font-size: 10rem;
    pointer-events: none;
    z-index: 500;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: bigPop 1.5s ease-out forwards;
  }
  @keyframes bigPop {
    0%   { transform: translate(-50%,-50%) scale(0) rotate(-20deg); opacity: 1; }
    30%  { transform: translate(-50%,-50%) scale(1.2) rotate(5deg);  opacity: 1; }
    70%  { transform: translate(-50%,-50%) scale(1)   rotate(-2deg); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(0.5) rotate(0deg);  opacity: 0; }
  }

  /* Floating text */
  .float-text {
    position: fixed;
    font-size: 0.7rem;
    pointer-events: none;
    z-index: 60;
    animation: floatUp 2s ease-out forwards;
    white-space: nowrap;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-120px) scale(0.8); }
  }

  /* CSS animations */
  @keyframes shake {
    0%,100% { transform: translate(0,0) rotate(0deg); }
    10% { transform: translate(-9px,-4px) rotate(-1deg); }
    20% { transform: translate(9px, 4px) rotate(1deg); }
    30% { transform: translate(-7px, 7px) rotate(-0.7deg); }
    40% { transform: translate(7px,-7px) rotate(0.7deg); }
    50% { transform: translate(-11px,2px) rotate(-1.5deg); }
    60% { transform: translate(11px,-2px) rotate(1.5deg); }
    70% { transform: translate(-5px, 9px) rotate(-1deg); }
    80% { transform: translate(5px,-9px) rotate(1deg); }
    90% { transform: translate(-3px, 4px) rotate(-0.4deg); }
  }

  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    20% { transform: translateY(-40px); }
    40% { transform: translateY(0); }
    60% { transform: translateY(-20px); }
    80% { transform: translateY(0); }
  }

  @keyframes spin360 {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  @keyframes melt {
    0%  { transform: skewX(0deg)  skewY(0deg); }
    20% { transform: skewX(6deg)  skewY(4deg); }
    40% { transform: skewX(-5deg) skewY(-3deg); }
    60% { transform: skewX(4deg)  skewY(6deg); }
    80% { transform: skewX(-3deg) skewY(-2deg); }
    100%{ transform: skewX(0deg)  skewY(0deg); }
  }

  @keyframes rainbowBg {
    0%  { background: #2d0000; }
    16% { background: #2d1a00; }
    33% { background: #2d2d00; }
    50% { background: #002d00; }
    66% { background: #00002d; }
    83% { background: #1a002d; }
    100%{ background: #2d0000; }
  }

  @keyframes warp {
    0%  { transform: perspective(400px) rotateY(0deg); }
    25% { transform: perspective(400px) rotateY(15deg); }
    75% { transform: perspective(400px) rotateY(-15deg); }
    100%{ transform: perspective(400px) rotateY(0deg); }
  }

  /* Victory screen */
  #victory {
    display: none;
    position: fixed; inset: 0;
    background: #080810;
    z-index: 2000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px;
  }
  #victory h1 {
    font-size: clamp(0.7rem, 3vw, 1.4rem);
    color: #ffd700;
    text-shadow: 0 0 30px #ffd700;
    margin-bottom: 30px;
    line-height: 2;
    animation: victoryPulse 1.2s infinite alternate;
  }
  @keyframes victoryPulse {
    from { text-shadow: 0 0 20px #ffd700, 0 0 40px #ff8c00; }
    to   { text-shadow: 0 0 60px #ffd700, 0 0 120px #ff8c00, 0 0 200px #ff4400; }
  }
  #victory p {
    font-size: clamp(0.35rem, 1.2vw, 0.55rem);
    color: #888;
    line-height: 2.8;
    margin-bottom: 36px;
  }
  #victory .highlight { color: #ffd700; }
  #victory button {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.5rem;
    padding: 14px 28px;
    background: #ffd700;
    color: #000;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    transition: transform 0.1s;
  }
  #victory button:hover { transform: scale(1.05); }
</style>
</head>
<body>

<div id="app">
  <div id="hint">?</div>
  <div id="counter">0 回</div>

  <div id="btn-wrapper">
    <div id="speech"></div>
    <button id="chaos-btn">押すな</button>
  </div>

  <div id="effect-label"></div>
</div>

<!-- Overlays (outside #app so effects on app don't affect them) -->
<div id="flash"></div>
<div id="matrix"></div>
<div id="scanlines"></div>

<div id="achievement"></div>

<div id="loading-container">
  <div id="loading-label">読み込み中...</div>
  <div id="loading-track"><div id="loading-bar"></div></div>
</div>

<div id="bsod">
  <div class="bsod-emoji">:(</div>
  <h2>問題が発生しました</h2>
  <p>PCはリセットする必要があります。<br><br>
     エラーコード: CHAOS_BUTTON_OVERFLOW<br><br>
     原因: ボタンを押しすぎです<br><br>
     ※ ウソです</p>
</div>

<div id="victory">
  <h1>🏆 CHAOS MASTER 🏆</h1>
  <p id="victory-body">
    100回押しました<br>
    あなたはこのボタンに <span class="highlight" id="time-spent">??秒</span> を費やしました<br><br>
    本当にやることないんですね
  </p>
  <button onclick="resetGame()">もう一度無駄にする</button>
</div>

<script>
// --- Elements ---
const btn = document.getElementById('chaos-btn');
const counterEl = document.getElementById('counter');
const effectLabelEl = document.getElementById('effect-label');
const appEl = document.getElementById('app');
const speechEl = document.getElementById('speech');
const achievementEl = document.getElementById('achievement');
const flashEl = document.getElementById('flash');
const hintEl = document.getElementById('hint');
const btnWrapper = document.getElementById('btn-wrapper');
const matrixEl = document.getElementById('matrix');
const scanlinesEl = document.getElementById('scanlines');
const loadingContainer = document.getElementById('loading-container');

// --- State ---
let pressCount = 0;
let startTime = null;
let lastEffectIdx = -1;
let btnRunning = false;
let achievementQueue = [];
let achievementTimer = null;

// --- Audio ---
let audioCtx = null;
function audio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function tone(freq, dur, type = 'sine', vol = 0.25) {
  try {
    const ctx = audio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function sadTrombone() {
  [220, 196, 175, 147].forEach((f, i) => setTimeout(() => tone(f, 0.3, 'sawtooth', 0.18), i * 240));
}
function fanfare() {
  [523, 659, 784, 1047, 1568].forEach((f, i) => setTimeout(() => tone(f, 0.18, 'square', 0.12), i * 110));
}
function beep(f = 880) { tone(f, 0.1, 'square', 0.15); }

// --- Helpers ---
function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function showLabel(text, dur = 2000) {
  effectLabelEl.textContent = text;
  effectLabelEl.style.opacity = '1';
  clearTimeout(effectLabelEl._t);
  effectLabelEl._t = setTimeout(() => effectLabelEl.style.opacity = '0', dur);
}

function flash(color = '#fff', dur = 200) {
  flashEl.style.background = color;
  flashEl.style.opacity = '0.65';
  clearTimeout(flashEl._t);
  flashEl._t = setTimeout(() => flashEl.style.opacity = '0', dur);
}

function showAchievement(text) {
  achievementQueue.push(text);
  if (!achievementTimer) drainAchievement();
}
function drainAchievement() {
  if (!achievementQueue.length) { achievementTimer = null; return; }
  const text = achievementQueue.shift();
  achievementEl.innerHTML = text;
  achievementEl.classList.add('show');
  fanfare();
  achievementTimer = setTimeout(() => {
    achievementEl.classList.remove('show');
    setTimeout(drainAchievement, 400);
  }, 3200);
}

function particle(emoji, x, y) {
  const el = document.createElement('div');
  el.className = 'particle';
  el.textContent = emoji;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  el.style.setProperty('--dx',  rand(-160, 160) + 'px');
  el.style.setProperty('--dy',  rand(-220,  -40) + 'px');
  el.style.setProperty('--rot', rand(-400, 400) + 'deg');
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1050);
}
function burst(emojis, x, y, n = 10) {
  for (let i = 0; i < n; i++)
    setTimeout(() => particle(pick(emojis), x + rand(-24, 24), y + rand(-24, 24)), i * 28);
}

function bigEmoji(e) {
  const el = document.createElement('div');
  el.className = 'big-emoji'; el.textContent = e;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

function floatText(text, color = '#ff4444') {
  const el = document.createElement('div');
  el.className = 'float-text'; el.textContent = text; el.style.color = color;
  el.style.left = rand(5, 75) + 'vw';
  el.style.top  = rand(15, 70) + 'vh';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2100);
}

function speech(text, dur = 2400) {
  speechEl.textContent = text;
  speechEl.classList.add('show');
  clearTimeout(speechEl._t);
  speechEl._t = setTimeout(() => speechEl.classList.remove('show'), dur);
}

function runMatrix() {
  matrixEl.innerHTML = '';
  matrixEl.classList.add('show');
  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789ABCDEF';
  for (let i = 0; i < 18; i++) {
    const col = document.createElement('div');
    col.className = 'matrix-col';
    col.style.left = (i * 5.8) + '%';
    const dur = rand(12, 28) / 10;
    col.style.animationDuration = dur + 's';
    col.style.animationDelay = rand(0, 600) + 'ms';
    let txt = '';
    for (let j = 0; j < 35; j++) txt += chars[rand(0, chars.length - 1)] + '\n';
    col.textContent = txt;
    matrixEl.appendChild(col);
  }
  setTimeout(() => { matrixEl.classList.remove('show'); matrixEl.innerHTML = ''; }, 3000);
}

function fakeDuplicates() {
  const n = rand(4, 7);
  for (let i = 0; i < n; i++) {
    const f = document.createElement('button');
    f.className = 'fake-btn';
    f.textContent = pick(['押すな', 'PUSH', '危険', '？', btn.textContent]);
    f.style.left = rand(4, 84) + 'vw';
    f.style.top  = rand(8, 78) + 'vh';
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 2300);
  }
}

function runLoadingBar(label) {
  loadingContainer.querySelector('#loading-label').textContent = label;
  loadingContainer.style.display = 'flex';
  const bar = document.getElementById('loading-bar');
  bar.style.width = '0%';
  let pct = 0;
  const iv = setInterval(() => {
    pct += rand(4, 18);
    if (pct >= 100) {
      pct = 100; bar.style.width = '100%';
      clearInterval(iv);
      setTimeout(() => {
        loadingContainer.style.display = 'none';
        bar.style.width = '0%';
      }, 600);
    } else {
      bar.style.width = pct + '%';
    }
  }, 90);
}

let btnEscaping = false;
function buttonRunAway() {
  if (btnEscaping) return;
  btnEscaping = true;
  let moves = 0;
  const iv = setInterval(() => {
    const x = rand(-38, 38), y = rand(-26, 26);
    btnWrapper.style.transition = 'transform 0.25s ease';
    btnWrapper.style.transform = `translate(${x}vw, ${y}vh)`;
    moves++;
    if (moves >= 5) {
      clearInterval(iv);
      setTimeout(() => {
        btnWrapper.style.transition = 'transform 0.5s ease';
        btnWrapper.style.transform = '';
        setTimeout(() => { btnWrapper.style.transition = ''; btnEscaping = false; }, 550);
      }, 100);
    }
  }, 300);
}

// --- Button text pool ---
const btnTexts = [
  '押すな', 'PUSH ME', '危険', 'やめろ', 'ダメ', '何してるの？',
  '押すな！', 'NO', '考えろ', '押しちゃえ', 'まだやるの？',
  '懲りないね', '🔴', '⚠️', '本当に？', 'また押すの',
  'やめてください', 'DANGER', '暇なの？', 'やれやれ',
  '…', '助けて', 'STOP', 'もう無理', 'ちょっと待って',
];

// --- EFFECTS POOL ---
const EFFECTS = [
  // Screen effects
  { n: '地震',       f: (x,y) => { appEl.style.animation='shake 0.6s'; flash('#fff',80); tone(70,0.5,'sawtooth',0.1); showLabel('💥 揺れた！'); setTimeout(()=>appEl.style.animation='',700); }},
  { n: '色反転',     f: (x,y) => { appEl.style.filter='invert(1)'; showLabel('🌈 色が反転した'); setTimeout(()=>appEl.style.filter='',2200); }},
  { n: '左右反転',   f: (x,y) => { appEl.style.transform='scaleX(-1)'; showLabel('↔️ 左右逆になった'); tone(440,0.2); setTimeout(()=>appEl.style.transform='',2200); }},
  { n: '上下反転',   f: (x,y) => { appEl.style.transform='scaleY(-1)'; showLabel('↕️ 上下逆になった'); tone(330,0.2); setTimeout(()=>appEl.style.transform='',2200); }},
  { n: '180°回転',   f: (x,y) => { appEl.style.cssText+='transform:rotate(180deg);transition:transform 0.5s;'; showLabel('🔄 全部ひっくり返った'); tone(200,0.4); setTimeout(()=>{appEl.style.transform='';appEl.style.transition='';},3000); }},
  { n: 'ズームイン', f: (x,y) => { appEl.style.cssText+='transform:scale(1.7);transition:transform 0.3s;'; showLabel('🔍 大きくなった'); setTimeout(()=>{appEl.style.transform='';appEl.style.transition='';},2000); }},
  { n: 'ズームアウト',f:(x,y) => { appEl.style.cssText+='transform:scale(0.45);transition:transform 0.3s;'; showLabel('🔎 小さくなった'); setTimeout(()=>{appEl.style.transform='';appEl.style.transition='';},2000); }},
  { n: 'モノクロ',   f: (x,y) => { appEl.style.filter='grayscale(1)'; showLabel('⬛ 色が消えた'); setTimeout(()=>appEl.style.filter='',2500); }},
  { n: 'セピア',     f: (x,y) => { appEl.style.filter='sepia(1)'; showLabel('📸 レトロになった'); setTimeout(()=>appEl.style.filter='',2500); }},
  { n: 'ぼかし',     f: (x,y) => { appEl.style.filter='blur(10px)'; showLabel('👁 ぼやけた'); setTimeout(()=>appEl.style.filter='',2000); }},
  { n: '彩度MAX',    f: (x,y) => { appEl.style.filter='saturate(12)'; showLabel('😵‍💫 目が痛い'); setTimeout(()=>appEl.style.filter='',2000); }},

// --- Click handler ---
btn.addEventListener('click', e => {
  if (!startTime) startTime = Date.now();
  pressCount++;
  counterEl.textContent = pressCount + ' 回';
  if (pressCount >= 50) counterEl.style.color = '#ff8800';
  if (pressCount >= 80) counterEl.style.color = '#ff4444';

  // Milestone achievements
  if (pressCount === 10)  showAchievement('🏆 10回押した！<br>本当にやるとは...');
  if (pressCount === 25)  showAchievement('🏆 25回！<br>もしかしてハマってる？');
  if (pressCount === 50)  showAchievement('🏆 50回達成！<br>折り返し地点（何の？）');
  if (pressCount === 75)  showAchievement('🏆 75回！<br>あと25回で...なにかが');
  if (pressCount === 99)  showAchievement('🔮 次で何かが...<br>本当になにかが起きる気がする');
  if (pressCount >= 100)  { showVictory(); return; }

  // Pick random effect (no repeat)
  let idx;
  do { idx = Math.floor(Math.random() * EFFECTS.length); } while (idx === lastEffectIdx);
  lastEffectIdx = idx;

  const r = btn.getBoundingClientRect();
  const cx = r.left + r.width / 2;
  const cy = r.top  + r.height / 2;
  try { EFFECTS[idx].f(cx, cy); } catch(err) {}
});

// --- Victory ---
function showVictory() {
  const elapsed = startTime ? Math.round((Date.now() - startTime) / 1000) : 0;
  const m = Math.floor(elapsed / 60), s = elapsed % 60;
  const tStr = m > 0 ? `${m}分${s}秒` : `${s}秒`;
  document.getElementById('time-spent').textContent = tStr;
  document.getElementById('victory').style.display = 'flex';

  // Confetti rain
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      burst(['🎊','🎉','⭐','✨','🌟','🏆','🎯','💎'],
        Math.random() * window.innerWidth,
        Math.random() * window.innerHeight, 3);
    }, i * 80);
  }
  fanfare(); setTimeout(fanfare, 700); setTimeout(fanfare, 1400);
}

// --- Reset ---
function resetGame() {
  pressCount = 0; startTime = null; lastEffectIdx = -1;
  counterEl.textContent = '0 回'; counterEl.style.color = '';
  btn.textContent = '押すな';
  btn.style.cssText = '';
  appEl.style.cssText = '';
  document.body.style.animation = '';
  document.body.style.cursor = '';
  btnWrapper.style.transform = '';
  btnWrapper.style.transition = '';
  hintEl.textContent = '?'; hintEl.style.color = '';
  effectLabelEl.textContent = '';
  flashEl.style.opacity = '0';
  scanlinesEl.classList.remove('show');
  matrixEl.classList.remove('show'); matrixEl.innerHTML = '';
  loadingContainer.style.display = 'none';
  document.getElementById('bsod').style.display = 'none';
  document.getElementById('victory').style.display = 'none';
  document.title = '混沌のボタン';
  btnEscaping = false;
}
