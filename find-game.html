<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>みつけろ！</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
    background: #0f0f1a;
    color: #fff;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ===== START SCREEN ===== */
  #start-screen {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000; text-align: center; padding: 24px;
  }
  #start-screen .logo { font-size: clamp(3rem, 10vw, 5rem); margin-bottom: 12px; }
  #start-screen h1 {
    font-size: clamp(2rem, 7vw, 3.5rem);
    background: linear-gradient(90deg, #ffd700, #ff6b35, #ffd700);
    background-size: 200%; -webkit-background-clip: text;
    -webkit-text-fill-color: transparent; background-clip: text;
    animation: shine 3s linear infinite; margin-bottom: 8px;
  }
  #start-screen .tagline {
    font-size: clamp(0.8rem, 2.5vw, 1rem); color: #aaa;
    line-height: 2; margin-bottom: 36px;
  }
  .level-preview {
    display: flex; gap: 12px; margin-bottom: 32px;
    flex-wrap: wrap; justify-content: center;
  }
  .level-chip {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px; padding: 8px 16px; font-size: 0.85rem; color: #ccc;
  }
  .level-chip span { font-size: 1.2rem; }

  /* ===== BUTTONS ===== */
  .big-btn {
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    padding: 16px 44px;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    color: #000; border: none; border-radius: 50px;
    cursor: pointer; font-weight: bold;
    transition: transform 0.12s, box-shadow 0.12s;
    box-shadow: 0 4px 24px rgba(255, 165, 0, 0.45);
  }
  .big-btn:hover { transform: scale(1.06); box-shadow: 0 6px 36px rgba(255,165,0,0.65); }
  .big-btn:active { transform: scale(0.96); }
  .ghost-btn {
    font-size: 0.85rem; padding: 10px 24px;
    background: transparent; color: #888;
    border: 1px solid #444; border-radius: 50px;
    cursor: pointer; transition: border-color 0.2s, color 0.2s; margin-top: 12px;
  }
  .ghost-btn:hover { border-color: #aaa; color: #ccc; }

  /* ===== HEADER ===== */
  #game-header {
    position: fixed; top: 0; left: 0; right: 0; height: 76px;
    background: rgba(8, 8, 20, 0.97);
    backdrop-filter: blur(12px);
    display: none; align-items: center;
    justify-content: space-between; padding: 0 18px;
    z-index: 100;
    border-bottom: 1px solid rgba(255,215,0,0.25);
    box-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
  #mission-box { display: flex; align-items: center; gap: 14px; }
  #target-display {
    width: 52px; height: 52px;
    background: rgba(255,215,0,0.12);
    border: 2px solid rgba(255,215,0,0.5);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    animation: targetGlow 2s ease-in-out infinite alternate;
  }
  @keyframes targetGlow {
    from { box-shadow: 0 0 8px rgba(255,215,0,0.3); }
    to   { box-shadow: 0 0 20px rgba(255,215,0,0.7); transform: scale(1.05); }
  }
  #mission-info { line-height: 1.6; }
  #mission-label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  #mission-text { font-size: clamp(0.75rem, 2vw, 1rem); color: #ffd700; font-weight: bold; }

  #header-right { display: flex; align-items: center; gap: 14px; }
  #level-badge { font-size: 0.65rem; color: #666; white-space: nowrap; }
  #miss-counter { font-size: 0.8rem; color: #ff6b6b; white-space: nowrap; }
  #timer {
    font-size: 1.3rem; color: #fff; min-width: 52px;
    text-align: center; font-variant-numeric: tabular-nums;
    font-weight: bold;
  }
  #timer.warn { color: #ff8c00; animation: timerWarn 0.6s infinite alternate; }
  @keyframes timerWarn { from { opacity: 1; } to { opacity: 0.4; } }
  #hint-btn {
    font-size: 0.7rem; padding: 7px 14px;
    background: rgba(255,255,255,0.08);
    color: #ddd; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 18px; cursor: pointer;
    transition: background 0.2s; white-space: nowrap;
  }
  #hint-btn:hover:not(:disabled) { background: rgba(255,255,255,0.18); }
  #hint-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  #hint-btn.used { color: #666; border-color: #333; }

  /* ===== PROGRESS BAR ===== */
  #progress-bar-wrap {
    position: fixed; top: 76px; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.06); z-index: 99;
    display: none;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #ffd700, #ff6b35);
    transition: width 0.5s ease;
  }

  /* ===== SCENE ===== */
  #scene-wrapper {
    position: fixed; top: 79px; left: 0; right: 0; bottom: 0;
    overflow: auto; cursor: crosshair;
    display: none;
    /* Subtle dot grid pattern */
    background-color: #fef9e7;
  }
  #scene {
    position: relative;
    /* width and height set by JS */
  }

  /* Emoji items */
  .ei {
    position: absolute;
    transform: translate(-50%, -50%);
    user-select: none;
    cursor: pointer;
    line-height: 1;
    transition: filter 0.1s;
    will-change: transform;
  }
  .ei:hover { filter: brightness(1.4) drop-shadow(0 0 4px rgba(255,255,255,0.5)); }

  /* ===== CLICK EFFECTS ===== */
  .ripple {
    position: absolute;
    width: 56px; height: 56px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 10;
    animation: rippleOut 0.55s ease-out forwards;
  }
  .ripple.wrong { border: 3px solid #ff4444; background: rgba(255,68,68,0.15); }
  .ripple.correct {
    border: 3px solid gold; background: rgba(255,215,0,0.2);
    width: 90px; height: 90px;
  }
  @keyframes rippleOut {
    0%   { transform: translate(-50%,-50%) scale(0.4); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(2.8); opacity: 0; }
  }

  .float-msg {
    position: absolute; transform: translate(-50%, -130%);
    font-size: 0.9rem; font-weight: bold;
    pointer-events: none; white-space: nowrap;
    animation: floatUp 0.9s ease-out forwards; z-index: 11;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translate(-50%, -130%); }
    100% { opacity: 0; transform: translate(-50%, -230%); }
  }

  .hint-ring {
    position: absolute;
    width: 100px; height: 100px; border-radius: 50%;
    border: 4px solid gold;
    transform: translate(-50%, -50%);
    pointer-events: none; z-index: 20;
    animation: hintPulse 0.5s ease-in-out 4 alternate;
    box-shadow: 0 0 24px rgba(255,215,0,0.7), inset 0 0 24px rgba(255,215,0,0.2);
  }
  @keyframes hintPulse {
    from { transform: translate(-50%, -50%) scale(0.7); opacity: 0.5; }
    to   { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
  }

  /* ===== SCROLL NUDGE ===== */
  #scroll-nudge {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75); color: #aaa;
    font-size: 0.75rem; padding: 8px 20px;
    border-radius: 20px; z-index: 50;
    pointer-events: none; display: none;
    animation: nudgeFade 4s ease-out forwards;
  }
  @keyframes nudgeFade { 0%,60%{opacity:1} 100%{opacity:0} }

  /* ===== LEVEL COMPLETE ===== */
  #level-complete {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.88);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 500; text-align: center; padding: 24px;
  }
  .lc-found-emoji { font-size: 4rem; animation: bigPop 0.5s cubic-bezier(0.175,0.885,0.32,1.275); margin-bottom: 20px; }
  @keyframes bigPop {
    0%  { transform: scale(0) rotate(-30deg); }
    70% { transform: scale(1.2) rotate(5deg); }
    100%{ transform: scale(1) rotate(0deg); }
  }
  #level-complete h2 { font-size: clamp(1.5rem, 5vw, 2.4rem); color: #ffd700; text-shadow: 0 0 30px gold; margin-bottom: 20px; }
  .lc-stats {
    font-size: clamp(0.8rem, 2vw, 1rem); color: #aaa;
    line-height: 2.8; margin-bottom: 32px;
  }
  .lc-stats .val { color: #fff; font-weight: bold; font-size: 1.1em; }
  .lc-score-big { font-size: clamp(1.8rem, 6vw, 3rem); color: #ffd700; font-weight: bold; margin-bottom: 28px; text-shadow: 0 0 20px gold; }
  .lc-buttons { display: flex; flex-direction: column; align-items: center; gap: 10px; }

  /* ===== FINAL VICTORY ===== */
  #final-victory {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a15 100%);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 600; text-align: center; padding: 24px;
  }
  .fv-trophy { font-size: clamp(3rem, 10vw, 5rem); margin-bottom: 16px; animation: floatBob 2s ease-in-out infinite; }
  @keyframes floatBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
  #final-victory h1 {
    font-size: clamp(1.4rem, 5vw, 2.8rem);
    background: linear-gradient(90deg, #ffd700, #ff8c00, #ffd700);
    background-size: 200%; -webkit-background-clip: text;
    -webkit-text-fill-color: transparent; background-clip: text;
    animation: shine 2s linear infinite; margin-bottom: 24px;
  }
  #final-victory .summary {
    font-size: clamp(0.8rem, 2vw, 1rem); color: #aaa;
    line-height: 2.8; margin-bottom: 32px;
  }
  #final-victory .summary .val { color: #ffd700; font-weight: bold; }
  .final-total { font-size: clamp(1.4rem, 4vw, 2.2rem); color: #ffd700; font-weight: bold; margin-bottom: 28px; }

  /* ===== PARTICLES ===== */
  .pt {
    position: fixed; pointer-events: none;
    animation: ptFly 1.1s ease-out forwards; z-index: 1000;
    font-size: 1.4rem;
  }
  @keyframes ptFly {
    0%   { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.3) rotate(var(--r)); }
  }

  @keyframes shine {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
</style>
</head>
<body>

<!-- ===== START SCREEN ===== -->
<div id="start-screen">
  <div class="logo">🔍</div>
  <h1>みつけろ！</h1>
  <p class="tagline">
    たくさんのキャラクターの中から<br>
    指定されたアイテムを見つけ出せ！<br>
    スクロールして隅々まで探そう
  </p>
  <div class="level-preview">
    <div class="level-chip"><span>🎩</span> ステージ1</div>
    <div class="level-chip"><span>🦊</span> ステージ2</div>
    <div class="level-chip"><span>🍓</span> ステージ3</div>
    <div class="level-chip"><span>🐠</span> ステージ4</div>
    <div class="level-chip"><span>💎</span> ステージ5</div>
  </div>
  <button class="big-btn" onclick="startGame()">🎮 ゲームスタート</button>
</div>

<!-- ===== GAME HEADER ===== -->
<div id="game-header">
  <div id="mission-box">
    <div id="target-display">?</div>
    <div id="mission-info">
      <div id="mission-label">さがせ！</div>
      <div id="mission-text">---</div>
    </div>
  </div>
  <div id="header-right">
    <div id="level-badge">LEVEL 1/5</div>
    <div id="miss-counter">❌ 0</div>
    <div id="timer">0:00</div>
    <button id="hint-btn" onclick="showHint()" disabled>💡 ヒント</button>
  </div>
</div>

<!-- PROGRESS BAR -->
<div id="progress-bar-wrap">
  <div id="progress-bar" style="width:0%"></div>
</div>

<!-- ===== SCENE ===== -->
<div id="scene-wrapper">
  <div id="scene"></div>
</div>

<!-- SCROLL NUDGE -->
<div id="scroll-nudge">← スクロールして探そう →</div>

<!-- ===== LEVEL COMPLETE ===== -->
<div id="level-complete">
  <div class="lc-found-emoji" id="lc-emoji">🎩</div>
  <h2>みつけた！ 🎉</h2>
  <div class="lc-stats" id="lc-stats">
    タイム: <span class="val" id="lc-time">—</span><br>
    ミス回数: <span class="val" id="lc-miss">—</span> 回<br>
    ヒント: <span class="val" id="lc-hint-used">—</span>
  </div>
  <div class="lc-score-big" id="lc-score-big">+1000 pt</div>
  <div class="lc-buttons">
    <button class="big-btn" id="next-btn" onclick="nextLevel()">次のステージへ →</button>
    <button class="ghost-btn" onclick="retryLevel()">もう一度このステージを</button>
  </div>
</div>

<!-- ===== FINAL VICTORY ===== -->
<div id="final-victory">
  <div class="fv-trophy">🏆</div>
  <h1>全ステージクリア！</h1>
  <div class="summary" id="fv-summary">
    総タイム: <span class="val" id="fv-time">—</span><br>
    総ミス: <span class="val" id="fv-miss">—</span> 回<br>
  </div>
  <div class="final-total" id="fv-total-score">0 pt</div>
  <button class="big-btn" onclick="goToTitle()">タイトルへ戻る</button>
</div>

<script>
// ==================== LEVEL DATA ====================
const LEVELS = [
  {
    id: 1,
    targetEmoji: '🎩',
    missionText: 'シルクハットを見つけろ！',
    decoys: ['👒','🧢','🪖','⛑️','🎓','👑','🪄','🎪'],
    count: 70,
    bgColor: '#fef9e7',
    dotColor: 'rgba(200,180,100,0.12)',
  },
  {
    id: 2,
    targetEmoji: '🦊',
    missionText: 'キツネを見つけろ！',
    decoys: ['🐶','🐱','🐰','🐹','🦝','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸'],
    count: 100,
    bgColor: '#f1f8e9',
    dotColor: 'rgba(100,180,80,0.12)',
  },
  {
    id: 3,
    targetEmoji: '🍓',
    missionText: 'イチゴを見つけろ！',
    decoys: ['🍎','🍊','🍋','🍇','🫐','🍒','🍑','🥝','🍈','🍐','🍌','🍉','🥭','🍅'],
    count: 140,
    bgColor: '#fce4ec',
    dotColor: 'rgba(220,100,140,0.12)',
  },
  {
    id: 4,
    targetEmoji: '🐠',
    missionText: 'クマノミを見つけろ！',
    decoys: ['🐟','🐡','🦈','🐬','🐳','🦑','🦀','🦞','🦐','🐙','🦭','🐚','🦋','🐠'],
    count: 165,
    bgColor: '#e3f2fd',
    dotColor: 'rgba(60,130,220,0.12)',
  },
  {
    id: 5,
    targetEmoji: '💎',
    missionText: 'ダイヤモンドを見つけろ！',
    decoys: ['💠','🔷','🔹','🔮','💙','🌀','🧊','🔵','🟦','💜','🟣','🫧','🌐','🪩'],
    count: 210,
    bgColor: '#f3e5f5',
    dotColor: 'rgba(150,80,210,0.12)',
  },
];

// ==================== STATE ====================
let currentLevel = 0;
let timerInterval = null;
let elapsedSec = 0;
let missCount = 0;
let hintUsed = false;
let hintActivated = false;
let hintEnableTimer = null;
let found = false;
let totalTime = 0;
let totalMiss = 0;
let totalScore = 0;
let targetX = 0, targetY = 0;

const SCENE_W = 2800;
const SCENE_H = 2800;
const CELL = 66;

// ==================== AUDIO ====================
let actx = null;
function ctx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}
function tone(freq, dur, type = 'sine', vol = 0.18) {
  try {
    const c = ctx(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    o.start(); o.stop(c.currentTime + dur);
  } catch(e) {}
}
function sfxWrong()  { tone(180, 0.12, 'sawtooth', 0.08); }
function sfxFound()  { [523,659,784,1047,1319].forEach((f,i) => setTimeout(() => tone(f,0.18,'square',0.1), i*90)); }
function sfxVictory(){ [523,659,784,1047,1319,1047,1319,1568].forEach((f,i) => setTimeout(() => tone(f,0.2,'square',0.12), i*80)); }

// ==================== HELPERS ====================
function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function pick(arr)  { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = rand(0, i);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function fmtTime(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// ==================== GAME FLOW ====================
function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-header').style.display = 'flex';
  document.getElementById('progress-bar-wrap').style.display = 'block';
  document.getElementById('scene-wrapper').style.display = 'block';
  currentLevel = 0;
  totalTime = 0; totalMiss = 0; totalScore = 0;
  loadLevel(currentLevel);
}

function loadLevel(idx) {
  found = false;
  missCount = 0;
  hintUsed = false;
  hintActivated = false;
  elapsedSec = 0;

  const lv = LEVELS[idx];

  // Header
  document.getElementById('target-display').textContent = lv.targetEmoji;
  document.getElementById('mission-text').textContent = lv.missionText;
  document.getElementById('level-badge').textContent = `LEVEL ${lv.id} / 5`;
  document.getElementById('miss-counter').textContent = '❌ 0';
  document.getElementById('timer').textContent = '0:00';
  document.getElementById('timer').className = '';
  document.getElementById('progress-bar').style.width = ((idx / LEVELS.length) * 100) + '%';

  // Hint button
  const hb = document.getElementById('hint-btn');
  hb.disabled = true;
  hb.className = '';
  hb.textContent = '💡 ヒント';
  clearTimeout(hintEnableTimer);
  hintEnableTimer = setTimeout(() => { if (!found) hb.disabled = false; }, 25000);

  // Generate
  generateScene(lv);

  // Scroll to start
  const sw = document.getElementById('scene-wrapper');
  sw.scrollTo(0, 0);

  // Scroll nudge
  const nudge = document.getElementById('scroll-nudge');
  nudge.style.display = 'block';
  nudge.style.animation = 'none';
  void nudge.offsetWidth; // reflow
  nudge.style.animation = 'nudgeFade 4s ease-out forwards';
  setTimeout(() => nudge.style.display = 'none', 4200);

  // Overlays
  document.getElementById('level-complete').style.display = 'none';
  document.getElementById('final-victory').style.display = 'none';

  // Timer
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (found) return;
    elapsedSec++;
    document.getElementById('timer').textContent = fmtTime(elapsedSec);
    if (elapsedSec >= 60) document.getElementById('timer').className = 'warn';
    if (elapsedSec >= 25) document.getElementById('hint-btn').disabled = false;
  }, 1000);
}

// ==================== SCENE GENERATION ====================
function generateScene(lv) {
  const scene = document.getElementById('scene');
  scene.innerHTML = '';
  scene.style.width  = SCENE_W + 'px';
  scene.style.height = SCENE_H + 'px';
  scene.style.background = lv.bgColor;

  // Faint dot pattern
  scene.style.backgroundImage = `radial-gradient(circle, ${lv.dotColor} 1.5px, transparent 1.5px)`;
  scene.style.backgroundSize  = '30px 30px';

  // Build jittered grid
  const jit = CELL * 0.18;
  const cols = Math.floor(SCENE_W / CELL);
  const rows = Math.floor(SCENE_H / CELL);

  const cells = [];
  for (let r = 1; r < rows; r++) {
    for (let c = 1; c < cols; c++) {
      cells.push({
        x: c * CELL + rand(-jit, jit),
        y: r * CELL + rand(-jit, jit),
      });
    }
  }
  shuffle(cells);

  const total = lv.count + 1; // +1 for target
  const used  = cells.slice(0, total);

  // Target is always first used cell
  targetX = used[0].x;
  targetY = used[0].y;

  // Render items
  const frag = document.createDocumentFragment();
  used.forEach((cell, i) => {
    const isTarget = i === 0;
    const emoji = isTarget ? lv.targetEmoji : pick(lv.decoys);
    const size  = rand(28, 38);
    const rot   = rand(-20, 20);

    const el = document.createElement('span');
    el.className = 'ei';
    el.textContent = emoji;
    el.style.fontSize = size + 'px';
    el.style.left = cell.x + 'px';
    el.style.top  = cell.y + 'px';
    el.style.transform = `translate(-50%,-50%) rotate(${rot}deg)`;

    if (isTarget) {
      el.dataset.target = '1';
      el.addEventListener('click', onFoundClick, { once: true });
    } else {
      el.addEventListener('click', onWrongClick);
    }
    frag.appendChild(el);
  });
  scene.appendChild(frag);
}

// ==================== CLICK HANDLERS ====================
function onFoundClick(e) {
  if (found) return;
  found = true;
  clearInterval(timerInterval);
  clearTimeout(hintEnableTimer);
  document.getElementById('hint-btn').disabled = true;

  sfxFound();

  // Ripple + ring on target
  addRipple(targetX, targetY, 'correct');
  const ring = document.createElement('div');
  ring.className = 'hint-ring';
  ring.style.left = targetX + 'px';
  ring.style.top  = targetY + 'px';
  document.getElementById('scene').appendChild(ring);

  // Particles from click position
  burst(e.clientX, e.clientY, ['🎊','⭐','✨','💥','🌟','🎉'], 20);

  // Score
  const timePts  = Math.max(0, 1000 - elapsedSec * 7);
  const missPts  = Math.max(0, 400  - missCount  * 40);
  const hintPen  = hintActivated ? 200 : 0;
  const score    = Math.round(timePts + missPts - hintPen);
  totalScore += score;
  totalTime  += elapsedSec;
  totalMiss  += missCount;

  setTimeout(() => showLevelComplete(score), 900);
}

function onWrongClick(e) {
  if (found) return;
  sfxWrong();
  missCount++;
  document.getElementById('miss-counter').textContent = '❌ ' + missCount;

  const sw   = document.getElementById('scene-wrapper');
  const sr   = document.getElementById('scene').getBoundingClientRect();
  const cx   = e.clientX - sr.left + sw.scrollLeft;
  const cy   = e.clientY - sr.top  + sw.scrollTop;

  addRipple(cx, cy, 'wrong');

  const msg = document.createElement('div');
  msg.className = 'float-msg';
  msg.style.color = '#ff5555';
  msg.style.left  = cx + 'px';
  msg.style.top   = cy + 'px';
  msg.textContent = pick(['違う！','そこじゃない','はずれ','もっと探して']);
  document.getElementById('scene').appendChild(msg);
  setTimeout(() => msg.remove(), 1000);
}

function addRipple(x, y, type) {
  const r = document.createElement('div');
  r.className = `ripple ${type}`;
  r.style.left = x + 'px';
  r.style.top  = y + 'px';
  document.getElementById('scene').appendChild(r);
  setTimeout(() => r.remove(), 600);
}

function burst(cx, cy, emojis, n) {
  for (let i = 0; i < n; i++) {
    const el = document.createElement('div');
    el.className = 'pt';
    el.textContent = pick(emojis);
    el.style.left = cx + 'px';
    el.style.top  = cy + 'px';
    el.style.setProperty('--dx', rand(-200, 200) + 'px');
    el.style.setProperty('--dy', rand(-220, -60) + 'px');
    el.style.setProperty('--r',  rand(-360, 360) + 'deg');
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }
}

// ==================== HINT ====================
function showHint() {
  if (hintActivated) return;
  hintActivated = true;
  const hb = document.getElementById('hint-btn');
  hb.disabled = true;
  hb.className = 'used';
  hb.textContent = '💡 使用済';

  // Scroll to target
  const sw = document.getElementById('scene-wrapper');
  const wW = sw.clientWidth, wH = sw.clientHeight;
  sw.scrollTo({ left: Math.max(0, targetX - wW / 2), top: Math.max(0, targetY - wH / 2), behavior: 'smooth' });

  // Flash ring after scroll settles
  setTimeout(() => {
    const ring = document.createElement('div');
    ring.className = 'hint-ring';
    ring.style.left = targetX + 'px';
    ring.style.top  = targetY + 'px';
    document.getElementById('scene').appendChild(ring);
    setTimeout(() => ring.remove(), 2000);
  }, 700);

  tone(440, 0.15, 'sine', 0.1);
}

// ==================== LEVEL COMPLETE ====================
function showLevelComplete(score) {
  const lv = LEVELS[currentLevel];
  document.getElementById('lc-emoji').textContent      = lv.targetEmoji;
  document.getElementById('lc-time').textContent       = fmtTime(elapsedSec);
  document.getElementById('lc-miss').textContent       = missCount;
  document.getElementById('lc-hint-used').textContent  = hintActivated ? '使った (-200pt)' : '使わなかった！';
  document.getElementById('lc-score-big').textContent  = '+' + score.toLocaleString() + ' pt';

  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = currentLevel >= LEVELS.length - 1
    ? '🏆 結果を見る'
    : `次のステージへ (${LEVELS[currentLevel + 1].id}/5) →`;

  document.getElementById('level-complete').style.display = 'flex';

  // Confetti
  for (let i = 0; i < 6; i++) {
    setTimeout(() => burst(
      rand(80, window.innerWidth - 80),
      rand(80, window.innerHeight * 0.6),
      ['🎊','🎉','⭐','✨'], 6
    ), i * 200);
  }
}

function nextLevel() {
  currentLevel++;
  if (currentLevel >= LEVELS.length) {
    showFinalVictory();
  } else {
    loadLevel(currentLevel);
  }
}

function retryLevel() {
  loadLevel(currentLevel);
}

// ==================== FINAL VICTORY ====================
function showFinalVictory() {
  document.getElementById('level-complete').style.display   = 'none';
  document.getElementById('final-victory').style.display    = 'flex';
  document.getElementById('progress-bar').style.width       = '100%';

  const m = Math.floor(totalTime / 60), s = totalTime % 60;
  const tStr = m > 0 ? `${m}分${s}秒` : `${s}秒`;
  document.getElementById('fv-time').textContent       = tStr;
  document.getElementById('fv-miss').textContent       = totalMiss;
  document.getElementById('fv-total-score').textContent= '🏆 ' + totalScore.toLocaleString() + ' pt';

  sfxVictory();

  for (let i = 0; i < 18; i++) {
    setTimeout(() => burst(
      rand(0, window.innerWidth),
      rand(0, window.innerHeight),
      ['🎊','🎉','🏆','⭐','✨','💎','🌟'], 5
    ), i * 180);
  }
}

function goToTitle() {
  document.getElementById('final-victory').style.display  = 'none';
  document.getElementById('game-header').style.display    = 'none';
  document.getElementById('progress-bar-wrap').style.display = 'none';
  document.getElementById('scene-wrapper').style.display  = 'none';
  document.getElementById('start-screen').style.display   = 'flex';
  clearInterval(timerInterval);
  clearTimeout(hintEnableTimer);
}
</script>
