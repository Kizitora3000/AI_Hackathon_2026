<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名探偵キメラ・カードバトル - 衝撃の自己紹介</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --panel-bg: #1a1d24;
            --card-bg: #232731;
            --accent-gold: #f39c12;
            --accent-red: #e74c3c;
            --text-light: #f5f6fa;
            --text-dark: #7f8c8d;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 30%, #2c3e50 0%, var(--bg-color) 70%);
            color: var(--text-light);
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 30px auto;
            background: var(--panel-bg);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(243, 156, 18, 0.1);
            border: 1px solid #2c3a47;
        }

        h1 {
            color: var(--accent-gold);
            font-size: 28px;
            margin-bottom: 5px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 900;
            text-shadow: 0 2px 10px rgba(243, 156, 18, 0.3);
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-dark);
            letter-spacing: 2px;
            margin-bottom: 35px;
        }

        .card-table {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .card {
            background: linear-gradient(135deg, var(--card-bg) 0%, #171a21 100%);
            padding: 25px 10px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            border-bottom: 4px solid #2c3e50;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card.bump { transform: scale(1.05) translateY(-5px); }
        .card.title-card {
            border-bottom-color: var(--accent-red);
            background: linear-gradient(135deg, #2c1a1a 0%, #1a1010 100%);
        }
        .card.title-card .name-part { color: #ff7675; }
        .label { font-size: 10px; color: var(--text-dark); margin-bottom: 15px; letter-spacing: 1px; font-weight: bold;}
        .name-part { font-size: 24px; font-weight: bold; color: #ffffff; min-height: 40px; display: flex; align-items: center; justify-content: center;}

        /* メインビジュアルレイアウト */
        .summon-area {
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: #0d0f13;
            padding: 25px;
            border-radius: 15px;
            margin: 35px 0;
            border: 1px solid #2c3a47;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
            gap: 20px;
        }

        /* 漫画風 集中線パネル */
        .manga-panel-wrapper {
            position: relative;
            width: 100%;
            height: 220px;
            border: 4px solid #000;
            box-shadow: 8px 8px 0px #000;
            overflow: hidden;
            background: #fff;
        }

        #linesCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 驚き・ツッコミのトゲトゲ吹き出し風 */
        .shout-box {
            position: relative;
            z-index: 2;
            width: 85%;
            height: 80%;
            margin: 4% auto;
            background: #fff;
            border: 4px solid #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            transform: rotate(-0.5deg);
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            animation: shake 0.1s infinite alternate;
            animation-play-state: paused;
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(-0.5deg); }
            100% { transform: translate(-2px, -1px) rotate(0.5deg); }
        }

        /* 前後の叫びセリフスタイル */
        .speech-prefix {
            font-size: 14px;
            font-weight: 900;
            color: #000;
            align-self: flex-start;
            margin-left: 10px;
            letter-spacing: 1px;
        }

        /* ★「だ！！！」を黒文字＆さらに太く大きく修正★ */
        .speech-suffix {
            font-size: 24px;
            font-weight: 950;
            color: #000000;
            align-self: flex-end;
            margin-right: 15px;
            margin-top: 2px;
            letter-spacing: 2px;
            -webkit-text-stroke: 0.5px #000;
        }

        .full-title {
            font-size: 14px;
            color: #555;
            font-weight: 900;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .full-name {
            font-size: 32px;
            font-weight: 900;
            color: #000;
            letter-spacing: -1px;
            margin: 2px 0;
            text-align: center;
            line-height: 1.2;
        }

        .avatar-frame {
            border: 4px solid #2c3e50;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            background: #111;
            width: 180px;
            height: 180px;
            flex-shrink: 0;
        }

        button {
            background: linear-gradient(135deg, var(--accent-gold) 0%, #d35400 100%);
            color: #111;
            border: none;
            padding: 18px 60px;
            font-size: 20px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(243, 156, 18, 0.3);
            transition: all 0.2s ease;
            letter-spacing: 2px;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(243, 156, 18, 0.5); }
        .footer-credits { margin-top: 30px; padding-top: 20px; border-top: 1px solid #232731; }
        .origin-title { font-size: 11px; color: var(--text-dark); letter-spacing: 2px; margin-bottom: 10px;}
        .origin-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 500px; margin: 0 auto; text-align: left; font-size: 13px; color: #bdc3c7; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px;}
        .origin-item span { color: var(--text-dark); margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>CHIMERA DETECTIVE</h1>
    <div class="subtitle">- 真・名探偵キメラティックバトル -</div>
    
    <div class="card-table">
        <div class="card title-card" id="c-title"><span class="label">TITLE</span><div id="part-title" class="name-part">-</div></div>
        <div class="card" id="c-p1"><span class="label">HEAD</span><div id="part-1" class="name-part">-</div></div>
        <div class="card" id="c-p2"><span class="label">BODY</span><div id="part-2" class="name-part">-</div></div>
        <div class="card" id="c-p3"><span class="label">LEG</span><div id="part-3" class="name-part">-</div></div>
    </div>

    <div class="summon-area">
        <div class="manga-panel-wrapper">
            <canvas id="linesCanvas"></canvas>
            <div class="shout-box" id="shout-box">
                <div class="speech-prefix">「ボ、ボクの名前は、</div>
                
                <div id="res-title" class="full-title"></div>
                <div id="res-name" class="full-name">READY...</div>
                
                <div class="speech-suffix">だ！！！」</div>
            </div>
        </div>
        
        <div class="avatar-frame">
            <canvas id="avatarCanvas" width="180" height="180"></canvas>
        </div>
    </div>

    <div class="btn-container">
        <button onclick="generateChimera()">運命の召喚！</button>
    </div>

    <div class="footer-credits">
        <div class="origin-title">Analysis / 素材元ネタ</div>
        <div class="origin-grid" id="origin-grid">
            <div class="origin-item"><span>冠名:</span> -</div>
            <div class="origin-item"><span>上部:</span> -</div>
            <div class="origin-item"><span>中部:</span> -</div>
            <div class="origin-item"><span>下部:</span> -</div>
        </div>
    </div>
</div>

<script>
const titles = [
    { text: "【世紀の天才】", source: "探偵：シャーロック・ホームズ" },
    { text: "【灰色の脳細胞】", source: "探偵：エルキュール・ポアロ" },
    { text: "【見た目は子供】", source: "探偵：江戸川コナン" },
    { text: "【ジッチャンの名にかけて】", source: "探偵：金田一耕助" },
    { text: "【変幻自在の怪盗】", source: "怪盗：アルセーヌ・ルパン" },
    { text: "【完璧なアリバイ】", source: "犯人：ミステリーの定番" },
    { text: "【計画通りの神世界】", source: "犯人：夜神月（DEATH NOTE）" },
    { text: "【地獄の傀儡師】", source: "犯人：高遠遙一（金田一少年の事件簿）" },
    { text: "【全身黒タイツの】", source: "犯人：犯人の犯沢さん / 黒い人" },
    { text: "【最初からの犯人】", source: "犯人：アガサ・クリスティ某作" }
];

const parts1 = [
    { text: "シャー", source: "探偵：シャーロック・ホームズ" }, { text: "江戸", source: "探偵：江戸川コナン" },
    { text: "金田", source: "探偵：金田一耕助" }, { text: "古", source: "探偵：古畑任三郎" },
    { text: "夜神", source: "犯人：夜神月" }, { text: "高", source: "犯人：高遠遙一" },
    { text: "津", source: "犯人：津川館長" }, { text: "黒", source: "犯人：黒い犯人" },
    { text: "モリア", source: "犯人：モリアーティ教授" }, { text: "浅", source: "探偵：浅見光彦" }
];

const parts2 = [
    { text: "ロッ", source: "探偵：シャーロック・ホームズ" }, { text: "川コ", source: "探偵：江戸川コナン" },
    { text: "一耕", source: "探偵：金田一耕助" }, { text: "畑任", source: "探偵：古畑任三郎" },
    { text: "ライト", source: "犯人：夜神月" }, { text: "遠遙", source: "犯人：高遠遙一" },
    { text: "川館", source: "犯人：津川館長" }, { text: "タイ", source: "犯人：黒い犯人" },
    { text: "ーティ", source: "犯人：モリアーティ教授" }, { text: "浅見", source: "探偵：浅見光彦" }
];

const parts3 = [
    { text: "ク", source: "探偵：シャーロック・ホームズ" }, { text: "ナン", source: "探偵：江戸川コナン" },
    { text: "助", source: "探偵：金田一耕助" }, { text: "三郎", source: "探偵：古畑任三郎" },
    { text: "月", source: "犯人：夜神月" }, { text: "一", source: "犯人：高遠遙一" },
    { text: "長", source: "犯人：津川館長" }, { text: "ツ", source: "犯人：黒い犯人" },
    { text: "教授", source: "犯人：モリアーティ教授" }, { text: "ジャック", source: "犯人：切り裂きジャック" }
];

window.onload = () => {
    initCanvases();
};

function initCanvases() {
    const linesCanvas = document.getElementById('linesCanvas');
    linesCanvas.width = linesCanvas.offsetWidth;
    linesCanvas.height = linesCanvas.offsetHeight;
    
    const ctx = linesCanvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, linesCanvas.width, linesCanvas.height);
    drawSpeedLines(linesCanvas);

    const avatarCanvas = document.getElementById('avatarCanvas');
    const actx = avatarCanvas.getContext('2d');
    actx.fillStyle = '#222';
    actx.fillRect(0, 0, 180, 180);
}

function drawSpeedLines(canvas) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;
    const centerX = w / 2;
    const centerY = h / 2;

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);

    const lineCount = 180;
    ctx.strokeStyle = '#000000';
    
    for (let i = 0; i < lineCount; i++) {
        const angle = (i * 2 * Math.PI) / lineCount + (Math.random() * 0.05);
        const radius = 75 + Math.random() * 35;
        const lineLength = Math.max(w, h);

        const startX = centerX + Math.cos(angle) * radius;
        const startY = centerY + Math.sin(angle) * radius;
        const endX = centerX + Math.cos(angle) * lineLength;
        const endY = centerY + Math.sin(angle) * lineLength;

        ctx.lineWidth = 1 + Math.random() * 2.5;
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(endX, endY);
        ctx.stroke();
    }
}

function generateChimera() {
    const t = titles[Math.floor(Math.random() * titles.length)];
    const p1 = parts1[Math.floor(Math.random() * parts1.length)];
    const p2 = parts2[Math.floor(Math.random() * parts2.length)];
    const p3 = parts3[Math.floor(Math.random() * parts3.length)];

    const cleanP1 = p1.text.replace(/（.*?）/g, '');
    const cleanP2 = p2.text.replace(/（.*?）/g, '');
    const cleanP3 = p3.text.replace(/（.*?）/g, '');

    document.getElementById('part-title').innerText = t.text;
    document.getElementById('part-1').innerText = cleanP1;
    document.getElementById('part-2').innerText = cleanP2;
    document.getElementById('part-3').innerText = cleanP3;

    document.getElementById('res-title').innerText = t.text;
    document.getElementById('res-name').innerText = cleanP1 + cleanP2 + cleanP3;

    document.getElementById('origin-grid').innerHTML = `
        <div class="origin-item"><span>冠名:</span> ${t.source}</div>
        <div class="origin-item"><span>上部:</span> ${p1.source}</div>
        <div class="origin-item"><span>中部:</span> ${p2.source}</div>
        <div class="origin-item"><span>下部:</span> ${p3.source}</div>
    `;

    const linesCanvas = document.getElementById('linesCanvas');
    drawSpeedLines(linesCanvas);

    const shoutBox = document.getElementById('shout-box');
    shoutBox.style.animationPlayState = 'running';
    setTimeout(() => { shoutBox.style.animationPlayState = 'paused'; }, 500);

    const cards = ['c-title', 'c-p1', 'c-p2', 'c-p3'];
    cards.forEach((id, idx) => {
        const el = document.getElementById(id);
        el.classList.remove('bump');
        setTimeout(() => el.classList.add('bump'), idx * 50);
    });

    drawAvatar(t.source, p1.source, p2.source, p3.source);
}

function drawAvatar(titleSrc, headSrc, bodySrc, legSrc) {
    const canvas = document.getElementById('avatarCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 180, 180);

    let isCriminal = titleSrc.includes("犯人") || headSrc.includes("犯人") || bodySrc.includes("犯人") || legSrc.includes("犯人");
    
    const grad = ctx.createRadialGradient(90, 90, 10, 90, 90, 110);
    if (isCriminal) {
        grad.addColorStop(0, '#c0392b');
        grad.addColorStop(1, '#000000');
    } else {
        grad.addColorStop(0, '#2980b9');
        grad.addColorStop(1, '#0b0c10');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 180, 180);

    let isBlackMan = headSrc.includes("黒い犯人") || bodySrc.includes("黒い犯人");
    ctx.fillStyle = isBlackMan ? '#111217' : '#f3d1b0';
    
    ctx.beginPath();
    ctx.ellipse(90, 100, 32, 40, 0, 0, Math.PI * 2);
    ctx.fill();

    if (!isBlackMan) {
        ctx.fillStyle = '#2c3e50';
        if (headSrc.includes("ホームズ")) {
            ctx.fillStyle = '#57606f';
            ctx.beginPath(); ctx.moveTo(45, 72); ctx.lineTo(135, 72); ctx.lineTo(115, 45); ctx.lineTo(65, 45); ctx.closePath(); ctx.fill();
            ctx.fillRect(35, 68, 110, 5);
        } else if (headSrc.includes("夜神月") || headSrc.includes("高遠")) {
            ctx.fillStyle = headSrc.includes("夜神月") ? '#a4b0be' : '#2f3542';
            ctx.beginPath();
            ctx.moveTo(54, 76); ctx.lineTo(50, 50); ctx.lineTo(72, 63);
            ctx.lineTo(90, 40); ctx.lineTo(108, 63); ctx.lineTo(130, 50); ctx.lineTo(126, 76);
            ctx.fill();
        } else {
            ctx.fillStyle = '#4a3728';
            ctx.beginPath(); ctx.arc(90, 81, 35, Math.PI, 0); ctx.fill();
        }
    }

    if (isBlackMan) {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(68, 95); ctx.lineTo(83, 92); ctx.lineTo(79, 98); ctx.closePath(); ctx.fill();
        ctx.moveTo(112, 95); ctx.lineTo(97, 92); ctx.lineTo(101, 98); ctx.closePath(); ctx.fill();
    } else {
        ctx.fillStyle = '#fff'; ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(76, 95, 5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.arc(104, 95, 5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(76, 95, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(104, 95, 2, 0, Math.PI * 2); ctx.fill();
    }

    if ((bodySrc.includes("コナン") || headSrc.includes("コナン")) && !isBlackMan) {
        ctx.strokeStyle = '#3498db'; ctx.lineWidth = 3;
        ctx.strokeRect(65, 86, 22, 18); ctx.strokeRect(93, 86, 22, 18);
        ctx.beginPath(); ctx.moveTo(87, 95); ctx.lineTo(93, 95); ctx.stroke();
    }

    if (isBlackMan || titleSrc.includes("計画通り") || headSrc.includes("夜神月")) {
        ctx.strokeStyle = isBlackMan ? '#fff' : '#c0392b';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(76, 118);
        ctx.quadraticCurveTo(90, 131, 104, 114);
        ctx.stroke();
    } else {
        ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(90, 113, 7, 0.1, Math.PI - 0.1); ctx.stroke();
    }

    if (headSrc.includes("津川館長") || titleSrc.includes("計画通り")) {
        ctx.fillStyle = 'rgba(39, 174, 96, 0.4)';
        if(titleSrc.includes("計画通り")) ctx.fillStyle = 'rgba(231, 76, 60, 0.4)';
        ctx.beginPath();
        ctx.moveTo(90, 100);
        ctx.lineTo(0, 180); ctx.lineTo(180, 180);
        ctx.closePath();
        ctx.fill();
    }
}
</script>

</body>
</html>
