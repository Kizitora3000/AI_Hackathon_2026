<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>焼却探偵 — BURNING DETECTIVE</title>
<style>
  :root{
    --ink:#0d0b09;
    --ink2:#1c1712;
    --ash:#9a948a;
    --chalk:#e7e2d4;
    --evi:#f5c518;
    --evi-edge:#1a1408;
    --beam:#ffe9a8;
    --flame:#ff6a1a;
    --flame-hot:#ffd25a;
    --blood:#8a1410;
    --hud:#f3ede0;
    --hud-dim:#b8b0a0;
    --danger:#ff4322;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#000;overflow:hidden;
    font-family:"Helvetica Neue",Arial,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
  #wrap{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 90% at 50% -10%, #241a10 0%, #0a0806 60%, #000 100%)}
  #stage{position:relative;width:min(96vw, 168vh);aspect-ratio:16/10;max-width:980px;
    border-radius:14px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.04)}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;cursor:none;touch-action:none}

  /* ---- HUD ---- */
  #hud{position:absolute;inset:0;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;
    padding:14px 16px;color:var(--hud);text-shadow:0 1px 3px rgba(0,0,0,.7)}
  .hudrow{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .tag{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--hud-dim)}
  .stat{font:700 28px/1 ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-variant-numeric:tabular-nums}
  .right{text-align:right}
  #combo{transition:transform .08s;color:var(--flame-hot)}
  #timeStat.low{color:var(--danger);animation:pulse .6s infinite}
  @keyframes pulse{50%{opacity:.45}}
  #brand{display:flex;align-items:baseline;gap:10px}
  #brand b{font:800 17px/1 "Arial Narrow",Impact,sans-serif;letter-spacing:.18em;text-transform:uppercase}
  #brand span{font-size:10px;letter-spacing:.3em;color:var(--evi)}

  /* ---- buttons ---- */
  button{pointer-events:auto;cursor:pointer;font-family:inherit}
  #mute{position:absolute;top:12px;right:14px;width:34px;height:34px;border-radius:50%;
    border:1px solid rgba(255,255,255,.14);background:rgba(20,16,12,.55);color:var(--hud);font-size:15px;
    backdrop-filter:blur(4px)}

  /* ---- overlays ---- */
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:18px;padding:24px;color:var(--hud);background:rgba(6,4,3,.62);backdrop-filter:blur(3px);
    pointer-events:auto;z-index:5}
  .hidden{display:none !important}
  .screen.hidden{display:none}
  .kicker{font-size:12px;letter-spacing:.42em;text-transform:uppercase;color:var(--evi)}
  .title{font:800 clamp(34px,7vw,68px)/.92 "Arial Narrow",Impact,sans-serif;letter-spacing:.04em;
    text-transform:uppercase;color:var(--hud);
    text-shadow:0 0 28px rgba(255,120,30,.35), 0 3px 0 #000}
  .title .jp{display:block;font:800 clamp(20px,3.6vw,34px)/1 inherit;letter-spacing:.16em;margin-top:8px;
    -webkit-text-stroke:0;color:var(--evi)}
  .lede{max-width:30ch;font-size:14px;line-height:1.7;color:var(--hud-dim)}
  .play{margin-top:6px;padding:15px 34px;border:none;border-radius:40px;font:800 16px/1 inherit;letter-spacing:.06em;
    color:#1a0d00;background:linear-gradient(180deg,#ffd25a,#ff8a1a);
    box-shadow:0 10px 26px rgba(255,120,20,.4), inset 0 1px 0 rgba(255,255,255,.5)}
  .play:active{transform:translateY(1px)}
  .verdict{font:800 clamp(40px,8vw,82px)/.9 "Arial Narrow",Impact,sans-serif;letter-spacing:.04em;text-transform:uppercase}
  .verdict.win{color:var(--flame-hot);text-shadow:0 0 36px rgba(255,150,40,.6)}
  .verdict.lose{color:#9fd3ff;text-shadow:0 0 30px rgba(80,160,255,.5)}
  .scoreline{font:700 22px/1.3 ui-monospace,monospace;font-variant-numeric:tabular-nums}
  .scoreline small{display:block;font-size:11px;letter-spacing:.2em;color:var(--hud-dim);margin-top:4px;font-weight:400}
  .statgrid{display:flex;gap:26px;justify-content:center;flex-wrap:wrap}
  .replay{margin-top:4px;padding:13px 30px;border:1px solid rgba(255,255,255,.25);border-radius:40px;
    background:transparent;color:var(--hud);font:700 14px/1 inherit;letter-spacing:.08em}
  .replay:active{transform:translateY(1px)}
  .hint{font-size:11px;letter-spacing:.05em;color:var(--hud-dim);max-width:34ch;line-height:1.6}
  .btn-group{display:flex;gap:12px;margin-top:4px}
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game"></canvas>

    <div id="hud" class="hidden">
      <div class="hudrow">
        <div id="brand"><b>Burning Detective</b><span id="hudStageName">焼却探偵</span></div>
        <div class="right"><div class="tag">残り時間</div><div class="stat" id="timeStat">42</div></div>
      </div>
      <div class="hudrow">
        <div><div class="tag">証拠隠滅</div><div class="stat"><span id="killed">0</span><span style="color:var(--hud-dim)">/<span id="total">0</span></span></div></div>
        <div class="right"><div class="tag">コンボ</div><div class="stat" id="combo">×1</div></div>
      </div>
    </div>

    <button id="mute" title="音">♪</button>

    <div class="screen" id="startScreen">
      <div class="kicker">完全犯罪 シミュレーター</div>
      <h1 class="title">Burning<br>Detective<span class="jp">焼却探偵</span></h1>
      <p class="lede">名探偵の正体は、犯人だった。<br>虫眼鏡で太陽光を集め、現場の証拠をすべて焼き尽くせ。</p>
      <button class="play" id="startBtn">証拠隠滅をはじめる</button>
      <p class="hint">虫眼鏡を証拠に重ねて光を当てる。素早く連続で燃やすほどコンボ加点。制限時間内に全部消せば完全犯罪。</p>
    </div>

    <div class="screen hidden" id="endScreen">
      <div class="kicker" id="endKicker">事件 #001</div>
      <div class="verdict" id="verdict">完全犯罪</div>
      <div class="statgrid">
        <div class="scoreline" id="sc1">0<small>スコア</small></div>
        <div class="scoreline" id="sc2">0<small>最大コンボ</small></div>
        <div class="scoreline" id="sc3">0s<small>残り時間</small></div>
      </div>
      <p class="lede" id="endMsg"></p>
      <div class="btn-group">
        <button class="replay" id="replayBtn">もう一度</button>
        <button class="play hidden" id="nextBtn">次の事件へ</button>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";
  const cv = document.getElementById('game');
  const ctx = cv.getContext('2d');
  const stageEl = document.getElementById('stage');
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---------- sizing ----------
  let W = 0, H = 0, DPR = 1;
  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    const r = stageEl.getBoundingClientRect();
    W = r.width; H = r.height;
    cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);

  // ---------- input ----------
  const lens = { x: 0.5, y: 0.5, active: false };
  function setFromEvent(e){
    const r = stageEl.getBoundingClientRect();
    const p = (e.touches && e.touches[0]) ? e.touches[0] : e;
    lens.x = (p.clientX - r.left) / r.width;
    lens.y = (p.clientY - r.top) / r.height;
    lens.active = true;
  }
  stageEl.addEventListener('pointermove', setFromEvent);
  stageEl.addEventListener('pointerdown', e => { setFromEvent(e); });
  stageEl.addEventListener('touchmove', e => { setFromEvent(e); e.preventDefault(); }, {passive:false});

  // ---------- audio ----------
  let AC=null, master=null, noiseBuf=null, sizzleGain=null, muted=false;
  function initAudio(){
    if (AC) return;
    try{
      AC = new (window.AudioContext||window.webkitAudioContext)();
      master = AC.createGain(); master.gain.value = muted?0:0.9; master.connect(AC.destination);
      noiseBuf = AC.createBuffer(1, AC.sampleRate*1.2, AC.sampleRate);
      const d = noiseBuf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
      const src = AC.createBufferSource(); src.buffer = noiseBuf; src.loop = true;
      const bp = AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1600; bp.Q.value=0.7;
      sizzleGain = AC.createGain(); sizzleGain.gain.value = 0;
      src.connect(bp); bp.connect(sizzleGain); sizzleGain.connect(master); src.start();
    }catch(err){ AC=null; }
  }
  function whoosh(){
    if(!AC || muted) return;
    try{
      const o=AC.createGain(); o.gain.value=0.0001; o.connect(master);
      const s=AC.createBufferSource(); s.buffer=noiseBuf;
      const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.setValueAtTime(2400,AC.currentTime);
      f.frequency.exponentialRampToValueAtTime(300, AC.currentTime+0.35);
      s.connect(f); f.connect(o);
      o.gain.exponentialRampToValueAtTime(0.5, AC.currentTime+0.02);
      o.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime+0.4);
      s.start(); s.stop(AC.currentTime+0.42);
    }catch(err){}
  }
  document.getElementById('mute').addEventListener('click', ()=>{
    muted=!muted;
    document.getElementById('mute').textContent = muted?'♪̸':'♪';
    document.getElementById('mute').style.opacity = muted?0.5:1;
    if(master) master.gain.value = muted?0:0.9;
  });

  // ---------- game state ----------
  const EVIDENCE = [
    {e:'🔪', n:'凶器のナイフ', weight: 'heavy'}, {e:'🩸', n:'血痕', weight: 'heavy'}, {e:'👣', n:'足跡', weight: 'heavy'},
    {e:'✉️', n:'脅迫状', weight: 'light'}, {e:'🍷', n:'指紋', weight: 'heavy'}, {e:'📷', n:'決定的写真', weight: 'light'},
    {e:'🧤', n:'手袋', weight: 'light'}, {e:'🔑', n:'合鍵', weight: 'heavy'}, {e:'🚬', n:'吸い殻', weight: 'light'}
  ];
  
  const SPOTS = [
    [0.20,0.34],[0.50,0.24],[0.80,0.33],
    [0.32,0.58],[0.66,0.55],[0.18,0.74],
    [0.50,0.78],[0.82,0.72],[0.40,0.40]
  ];

  // ステージデータ
  const STAGES = [
    { name: "CASE 01: 晴天の密室", time: 45, windSpeed: 0 },
    { name: "CASE 02: 吹き抜ける突風", time: 40, windSpeed: 0.05 },
    { name: "CASE 03: 暴風雨の予兆", time: 35, windSpeed: 0.10 }
  ];
  
  let currentStageIdx = 0;
  let items=[], parts=[], pops=[];
  let killed=0, score=0, combo=0, maxCombo=0, comboTimer=0;
  let timeLeft=45, running=false, last=0, ended=false;
  
  const BURN_RATE=1.25, COOL=0.28, COMBO_WINDOW=2.2;
  let windVx = 0;
  let windVy = 0;

  function reset(){
    resize();
    const st = STAGES[currentStageIdx];
    
    items = EVIDENCE.map((d,i)=>({
      ...d, x:SPOTS[i][0], y:SPOTS[i][1], heat:0, state:'intact',
      ig:0, ash:0, tilt:0, num:i+1, rot:(Math.random()-.5)*0.25
    }));
    parts=[]; pops=[]; killed=0; score=0; combo=0; maxCombo=0; comboTimer=0;
    ended=false;
    
    // ステージ情報のセット
    timeLeft = st.time;
    windVx = st.windSpeed;
    windVy = -st.windSpeed * 0.4;

    document.getElementById('hudStageName').textContent = st.name;
    document.getElementById('total').textContent=items.length;
    document.getElementById('killed').textContent=0;
    document.getElementById('combo').textContent='×1';
    document.getElementById('timeStat').textContent=timeLeft;
    document.getElementById('timeStat').classList.remove('low');
  }

  function start(){
    initAudio(); if(AC && AC.state==='suspended') AC.resume();
    reset();
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('endScreen').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    running=true; last=performance.now(); requestAnimationFrame(loop);
  }

  // ボタンイベント群
  document.getElementById('startBtn').addEventListener('click', () => {
    currentStageIdx = 0; start();
  });
  document.getElementById('replayBtn').addEventListener('click', () => {
    if (currentStageIdx >= STAGES.length - 1 && killed >= items.length) {
      currentStageIdx = 0; // 全クリ後なら最初から
    }
    start();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    currentStageIdx++; start();
  });

  // ---------- particles ----------
  function smoke(x,y,intensity){
    if(reduce && Math.random()>0.4) return;
    parts.push({t:'smoke', x:x+(Math.random()-.5)*14, y, vx:(Math.random()-.5)*12,
      vy:-22-Math.random()*30, r:6+Math.random()*8, life:0, max:1.1+Math.random()*0.8,
      a:0.18+intensity*0.22});
  }
  function ember(x,y){
    parts.push({t:'ember', x, y, vx:(Math.random()-.5)*90, vy:-60-Math.random()*120,
      r:1.4+Math.random()*2, life:0, max:0.5+Math.random()*0.5});
  }
  function burst(x,y){
    const n = reduce?10:26;
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, sp=40+Math.random()*180;
      parts.push({t:'flame', x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-40,
        r:3+Math.random()*5, life:0, max:0.4+Math.random()*0.4});
    }
    for(let i=0;i<(reduce?6:16);i++) ember(x,y);
  }
  function popup(x,y,txt,big){
    pops.push({x,y,txt,life:0,max:0.95,big:!!big});
  }

  // ---------- loop ----------
  function loop(now){
    if(!running) return;
    let dt=(now-last)/1000; last=now; if(dt>0.05) dt=0.05;
    update(dt); render();
    requestAnimationFrame(loop);
  }

  const px = n => n*W, py = n => n*H;
  function itemRadius(){ return Math.max(26, Math.min(W,H)*0.052); }
  function focalRadius(){ return Math.max(26, Math.min(W,H)*0.05); }

  function update(dt){
    if(ended) return;
    timeLeft -= dt;
    const ts=document.getElementById('timeStat');
    ts.textContent = Math.max(0, Math.ceil(timeLeft));
    if(timeLeft<=10) ts.classList.add('low');

    // combo decay
    if(comboTimer>0){ comboTimer-=dt; if(comboTimer<=0){ combo=0; document.getElementById('combo').textContent='×1'; } }

    const lx=px(lens.x), ly=py(lens.y), ir=itemRadius(), fr=focalRadius();
    let anyBurning=0;

    for(const it of items){
      if(it.state==='ash'){ if(it.ash<1) it.ash=Math.min(1,it.ash+dt*2.4); continue; }

      // 風の影響 (windSpeedが0以上のステージのみ)
      if (it.weight === 'light' && windVx !== 0) {
        it.x += (windVx + (Math.random() - 0.5) * Math.abs(windVx) * 0.5) * dt;
        it.y += (windVy + (Math.random() - 0.5) * Math.abs(windVy) * 0.5) * dt;
        if (it.x < 0.1 || it.x > 0.9) windVx *= -1;
        if (it.y < 0.1 || it.y > 0.8) windVy *= -1;
      }

      const dx=px(it.x)-lx, dy=py(it.y)-ly;
      const hot = (dx*dx+dy*dy) < (ir+fr)*(ir+fr)*0.6;
      
      if(hot && lens.active){
        it.heat=Math.min(1, it.heat + BURN_RATE*dt);
        anyBurning=Math.max(anyBurning, it.heat);
        smoke(px(it.x), py(it.y)-ir*0.3, it.heat);
        if(Math.random()<it.heat*0.5) ember(px(it.x)+(Math.random()-.5)*ir, py(it.y));
      } else {
        it.heat=Math.max(0, it.heat - COOL*dt);
      }
      
      if(it.state==='intact' && it.heat>=1){
        it.state='burning'; it.ig=0;
        burst(px(it.x), py(it.y)); whoosh();
        comboTimer=COMBO_WINDOW; combo++; maxCombo=Math.max(maxCombo,combo);
        const gain=100*combo; score+=gain;
        document.getElementById('combo').textContent='×'+combo;
        const cEl=document.getElementById('combo'); cEl.style.transform='scale(1.35)';
        setTimeout(()=>cEl.style.transform='scale(1)',90);
        popup(px(it.x), py(it.y)-ir, '+'+gain, combo>=3);
        killed++; document.getElementById('killed').textContent=killed;
      }
      if(it.state==='burning'){
        it.ig+=dt; it.tilt=Math.min(1,it.tilt+dt*2);
        smoke(px(it.x), py(it.y)-ir*0.4, 1);
        if(it.ig>0.55){ it.state='ash'; it.ash=0; }
      }
    }

    if(sizzleGain){ sizzleGain.gain.value = muted?0 : Math.min(0.4, anyBurning*0.4); }

    // particles
    for(let i=parts.length-1;i>=0;i--){
      const p=parts[i]; p.life+=dt;
      if(p.life>=p.max){ parts.splice(i,1); continue; }
      p.x+=p.vx*dt; p.y+=p.vy*dt;
      if(p.t==='smoke'){ p.vy*=0.98; p.vx*=0.98; p.r+=dt*22; }
      else if(p.t==='ember'){ p.vy+=120*dt; }
      else if(p.t==='flame'){ p.vy+=60*dt; p.vx*=0.95; }
    }
    for(let i=pops.length-1;i>=0;i--){ pops[i].life+=dt; pops[i].y-=dt*34; if(pops[i].life>=pops[i].max) pops.splice(i,1); }

    if(killed>=items.length){ finish(true); }
    else if(timeLeft<=0){ finish(false); }
  }

  function finish(win){
    ended=true; running=false;
    if(sizzleGain) sizzleGain.gain.value=0;
    const v=document.getElementById('verdict');
    v.textContent = win?'証拠隠滅':'御用だ！';
    v.className='verdict '+(win?'win':'lose');
    document.getElementById('endKicker').textContent = STAGES[currentStageIdx].name;
    document.getElementById('sc1').innerHTML = score.toLocaleString()+'<small>スコア</small>';
    document.getElementById('sc2').innerHTML = '×'+maxCombo+'<small>最大コンボ</small>';
    document.getElementById('sc3').innerHTML = Math.max(0,Math.ceil(timeLeft))+'s<small>残り時間</small>';
    
    const remain=items.length-killed;
    const msgEl = document.getElementById('endMsg');
    const nextBtn = document.getElementById('nextBtn');
    const replayBtn = document.getElementById('replayBtn');

    if(win){
      if(currentStageIdx < STAGES.length - 1){
        msgEl.textContent = '現場はすっかり灰の中。急いで次の現場へ向かおう。';
        nextBtn.classList.remove('hidden');
        replayBtn.classList.add('hidden');
      } else {
        v.textContent = '完全犯罪';
        msgEl.textContent = '全ての証拠を隠滅した！名探偵の完全犯罪は続く……。';
        nextBtn.classList.add('hidden');
        replayBtn.classList.remove('hidden');
        replayBtn.textContent = '最初から遊ぶ';
      }
    } else {
      msgEl.textContent = '証拠が'+remain+'点残ってしまった。手錠の冷たさが心地よい季節だ。';
      nextBtn.classList.add('hidden');
      replayBtn.classList.remove('hidden');
      replayBtn.textContent = 'もう一度';
    }

    document.getElementById('hud').classList.add('hidden');
    document.getElementById('endScreen').classList.remove('hidden');
  }

  // ---------- render ----------
  function roundedScene(){
    const g=ctx.createRadialGradient(W*0.5,H*0.2,10, W*0.5,H*0.5,Math.max(W,H)*0.8);
    g.addColorStop(0,'#241a12'); g.addColorStop(0.55,'#150f0a'); g.addColorStop(1,'#0a0705');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    
    if(running && !ended){
      const dgr=Math.max(0,(10-timeLeft)/10);
      if(dgr>0){ ctx.fillStyle='rgba(120,10,0,'+(dgr*0.22)+')'; ctx.fillRect(0,0,W,H); }
    }
    ctx.strokeStyle='rgba(255,220,170,0.03)'; ctx.lineWidth=1;
    for(let y=H*0.12;y<H;y+=Math.max(34,H*0.07)){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
    drawChalk(W*0.62, H*0.6, Math.min(W,H)*0.16);
  }
  function drawChalk(cx,cy,s){
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(0.5);
    ctx.strokeStyle='rgba(231,226,212,0.16)'; ctx.lineWidth=Math.max(2,s*0.05);
    ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(0,-s*0.9,s*0.32,0,Math.PI*2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0,-s*0.55); ctx.lineTo(0,s*0.5);
    ctx.moveTo(0,-s*0.3); ctx.lineTo(-s*0.7,s*0.05);
    ctx.moveTo(0,-s*0.3); ctx.lineTo(s*0.6,-s*0.25);
    ctx.moveTo(0,s*0.5); ctx.lineTo(-s*0.45,s*1.05);
    ctx.moveTo(0,s*0.5); ctx.lineTo(s*0.5,s*1.0);
    ctx.stroke(); ctx.restore();
  }

  function drawMarker(x,y,num,r,tilt){
    ctx.save(); ctx.translate(x,y+r*0.55);
    ctx.rotate(tilt*0.9);
    const w=r*0.9, h=r*1.0;
    ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.beginPath();
    ctx.ellipse(0,2,w*0.7,4,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=getCSS('--evi'); ctx.strokeStyle=getCSS('--evi-edge'); ctx.lineWidth=Math.max(1,r*0.04);
    ctx.beginPath(); ctx.moveTo(0,-h); ctx.lineTo(w*0.62,0); ctx.lineTo(-w*0.62,0); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.fillStyle=getCSS('--evi-edge'); ctx.font='700 '+Math.round(r*0.5)+'px ui-monospace,monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(num, 0, -h*0.42);
    ctx.restore();
  }

  const cssCache={};
  function getCSS(v){ if(!cssCache[v]) cssCache[v]=getComputedStyle(document.documentElement).getPropertyValue(v).trim(); return cssCache[v]; }

  function drawItem(it){
    const x=px(it.x), y=py(it.y), ir=itemRadius();
    drawMarker(x, y, it.num, ir*0.7, it.state==='ash'?1:it.tilt);

    if(it.state==='ash'){
      ctx.save(); ctx.globalAlpha=0.9;
      const a=it.ash;
      ctx.fillStyle='rgba(60,55,50,'+(0.85)+')';
      ctx.beginPath(); ctx.ellipse(x,y+ir*0.2, ir*0.6*a, ir*0.22*a, 0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(120,112,104,0.6)';
      for(let k=0;k<5;k++){ const ang=k/5*Math.PI*2;
        ctx.beginPath(); ctx.arc(x+Math.cos(ang)*ir*0.3*a, y+ir*0.2+Math.sin(ang)*ir*0.08*a, ir*0.08*a,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
      return;
    }

    const burn = it.state==='burning' ? it.ig/0.55 : 0;
    const scale = 1 - burn*0.45;
    ctx.save(); ctx.translate(x,y); ctx.rotate(it.rot + burn*0.3); ctx.scale(scale,scale);
    ctx.font = Math.round(ir*1.15)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.globalAlpha = 1;
    ctx.fillText(it.e, 0, 0);
    if(it.heat>0.02){
      ctx.globalCompositeOperation='source-atop';
      ctx.fillStyle='rgba(20,8,2,'+Math.min(0.85,it.heat*0.95)+')';
      ctx.fillRect(-ir,-ir,ir*2,ir*2);
      ctx.globalCompositeOperation='lighter';
      ctx.fillStyle='rgba(255,'+Math.round(80+120*(1-it.heat))+',20,'+(it.heat*0.5)+')';
      ctx.fillRect(-ir,-ir,ir*2,ir*2);
    }
    ctx.restore();
  }

  function drawParticles(){
    ctx.save();
    for(const p of parts){
      const t=p.life/p.max;
      if(p.t==='smoke'){
        ctx.globalCompositeOperation='source-over';
        ctx.fillStyle='rgba(150,145,138,'+(p.a*(1-t))+')';
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      } else if(p.t==='ember'){
        ctx.globalCompositeOperation='lighter';
        ctx.fillStyle='rgba(255,'+Math.round(170*(1-t))+',40,'+(1-t)+')';
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      } else { 
        ctx.globalCompositeOperation='lighter';
        const c = t<0.5? '255,210,90' : '255,90,20';
        ctx.fillStyle='rgba('+c+','+(1-t)+')';
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(1+t),0,Math.PI*2); ctx.fill();
      }
    }
    ctx.restore();
  }

  function drawBeamAndLens(){
    if(!lens.active) lens.x=lens.x;

    const lx=px(lens.x), ly=py(lens.y), fr=focalRadius();
    const sunX=W*0.5, sunY=-H*0.12;
    ctx.save(); ctx.globalCompositeOperation='lighter';
    const sg=ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,H*0.5);
    sg.addColorStop(0,'rgba(255,235,170,0.45)'); sg.addColorStop(1,'rgba(255,235,170,0)');
    ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);

    const ang=Math.atan2(ly-sunY, lx-sunX);
    const perp=ang+Math.PI/2;
    const topW=W*0.16, botW=fr*0.5;
    const bx=lx, by=ly;
    const grad=ctx.createLinearGradient(sunX,sunY,bx,by);
    grad.addColorStop(0,'rgba(255,236,175,0.0)');
    grad.addColorStop(0.5,'rgba(255,228,150,0.10)');
    grad.addColorStop(1,'rgba(255,210,110,0.32)');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.moveTo(sunX+Math.cos(perp)*topW, sunY+Math.sin(perp)*topW);
    ctx.lineTo(sunX-Math.cos(perp)*topW, sunY-Math.sin(perp)*topW);
    ctx.lineTo(bx-Math.cos(perp)*botW, by-Math.sin(perp)*botW);
    ctx.lineTo(bx+Math.cos(perp)*botW, by+Math.sin(perp)*botW);
    ctx.closePath(); ctx.fill();
    ctx.restore();

    const pulse = 1 + (reduce?0:Math.sin(performance.now()/90)*0.12);
    ctx.save(); ctx.globalCompositeOperation='lighter';
    const fg=ctx.createRadialGradient(lx,ly,0,lx,ly,fr*1.6*pulse);
    fg.addColorStop(0,'rgba(255,255,245,0.95)');
    fg.addColorStop(0.25,'rgba(255,220,130,0.7)');
    fg.addColorStop(1,'rgba(255,120,30,0)');
    ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(lx,ly,fr*1.6*pulse,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.95)'; ctx.beginPath(); ctx.arc(lx,ly,fr*0.16*pulse,0,Math.PI*2); ctx.fill();
    ctx.restore();

    ctx.save(); ctx.translate(lx,ly);
    ctx.beginPath(); ctx.arc(0,0,fr,0,Math.PI*2);
    ctx.fillStyle='rgba(180,210,230,0.08)'; ctx.fill();
    ctx.beginPath(); ctx.arc(-fr*0.3,-fr*0.3,fr*0.55,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.10)'; ctx.fill();
    ctx.lineWidth=Math.max(4,fr*0.18); ctx.strokeStyle='#15110c';
    ctx.beginPath(); ctx.arc(0,0,fr,0,Math.PI*2); ctx.stroke();
    ctx.lineWidth=Math.max(1.5,fr*0.06); ctx.strokeStyle='#b9863f';
    ctx.beginPath(); ctx.arc(0,0,fr*0.92,0,Math.PI*2); ctx.stroke();
    const ha=ang; const hx=Math.cos(ha), hy=Math.sin(ha);
    ctx.lineWidth=Math.max(6,fr*0.26); ctx.lineCap='round'; ctx.strokeStyle='#3a2412';
    ctx.beginPath(); ctx.moveTo(hx*fr, hy*fr); ctx.lineTo(hx*fr*2.1, hy*fr*2.1); ctx.stroke();
    ctx.lineWidth=Math.max(2,fr*0.1); ctx.strokeStyle='#6b4423';
    ctx.beginPath(); ctx.moveTo(hx*fr, hy*fr); ctx.lineTo(hx*fr*2.0, hy*fr*2.0); ctx.stroke();
    ctx.restore();
  }

  function drawPops(){
    ctx.save(); ctx.textAlign='center'; ctx.textBaseline='middle';
    for(const p of pops){
      const t=p.life/p.max, a=1-t;
      ctx.globalAlpha=a;
      ctx.fillStyle=p.big?getCSS('--flame-hot'):'#ffe9c0';
      ctx.font='800 '+(p.big?28:20)+'px "Arial Narrow",Impact,sans-serif';
      ctx.fillText(p.txt, p.x, p.y);
    }
    ctx.restore(); ctx.globalAlpha=1;
  }

  function render(){
    ctx.clearRect(0,0,W,H);
    roundedScene();
    for(const it of items) drawItem(it);
    drawParticles();
    drawBeamAndLens();
    drawPops();
  }

  resize();
  reset();
  render();
})();
</script>
</body>
</html>
